<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TrialSite Intelligence</title>
<link rel="icon" href="https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/dna.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg:#ffffff;--bg-subtle:#f8f8f7;--bg-muted:#f1f0ee;--bg-raised:#ffffff;
  --border:#e2e2de;--border-strong:#c8c8c4;
  --text:#181816;--text-2:#52524e;--text-3:#888884;
  --blue:#1a5276;--blue-bg:#eaf0f6;--blue-mid:#2471a3;
  --green:#1a6b3a;--green-bg:#eaf5ee;
  --amber:#7d4e00;--amber-bg:#fef9ec;
  --red:#8b1f1f;--red-bg:#fdf0f0;
  --purple:#4a2885;--purple-bg:#f3effe;
  --teal:#0e6e6e;--teal-bg:#e8f6f6;
  --r:6px;--r-lg:10px;
  --font:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;
  --mono:"SF Mono","Fira Code",monospace;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.09);
  --shadow-lg:0 12px 40px rgba(0,0,0,.14);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#161614;--bg-subtle:#1e1e1c;--bg-muted:#262624;--bg-raised:#1e1e1c;
  --border:#303030;--border-strong:#484848;
  --text:#f0efe8;--text-2:#a0a09a;--text-3:#606060;
  --blue:#7bafd4;--blue-bg:#12202c;--blue-mid:#5090b8;
  --green:#70c090;--green-bg:#0e2018;
  --amber:#d4954a;--amber-bg:#201808;
  --red:#e87878;--red-bg:#200e0e;
  --purple:#a888e8;--purple-bg:#1a1028;
  --teal:#48b8b8;--teal-bg:#081818;
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg-subtle);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
button,input,select,textarea{font-family:var(--font)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
.shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{height:52px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:300;flex-shrink:0}
.body{display:flex;flex:1}
.sidebar{width:196px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;flex-shrink:0}
.content{flex:1;min-width:0;padding:24px 28px;overflow-x:hidden}
.brand{display:flex;align-items:center;gap:9px;flex-shrink:0;text-decoration:none}
.brand-mark{width:28px;height:28px;background:var(--blue);border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-name{font-size:13px;font-weight:600;letter-spacing:-.2px;color:var(--text)}
.brand-version{font-size:10px;color:var(--text-3);font-weight:400}
.tb-search{flex:1;max-width:400px;position:relative}
.tb-search input{width:100%;height:32px;padding:0 30px 0 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg-subtle);font-size:13px;color:var(--text);outline:none;transition:border-color .15s}
.tb-search input:focus{border-color:var(--blue);background:var(--bg)}
.tb-search input::placeholder{color:var(--text-3)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-2)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tb-btn{height:30px;padding:0 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);font-size:12px;color:var(--text-2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.tb-btn:hover{border-color:var(--border-strong);color:var(--text)}
.nav-group{padding:12px 10px 3px;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--text-3)}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:12.5px;color:var(--text-2);cursor:pointer;border-left:2px solid transparent;transition:all .1s;user-select:none}
.nav-item:hover{color:var(--text);background:var(--bg-subtle)}
.nav-item.active{color:var(--blue);background:var(--blue-bg);border-left-color:var(--blue);font-weight:500}
.nav-item svg{width:13px;height:13px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.sidebar-foot{padding:12px 14px 14px;border-top:1px solid var(--border)}
.sb-stat{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;color:var(--text-2)}
.sb-stat .v{font-weight:500;color:var(--text);font-variant-numeric:tabular-nums}
.sb-updates{margin:8px 10px;border:1px solid var(--border);border-radius:var(--r-lg);background:var(--bg-subtle);cursor:pointer;transition:border-color .15s,background .15s;overflow:hidden}
.sb-updates:hover{border-color:var(--border-strong);background:var(--bg)}
.sb-updates-hd{padding:8px 10px 6px;display:flex;align-items:center;justify-content:space-between}
.sb-updates-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3)}
.sb-update-row{padding:5px 10px;display:flex;align-items:flex-start;gap:7px;border-top:1px solid var(--border)}
.sb-update-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px}
.sb-update-text{font-size:11px;color:var(--text-2);line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.sb-updates-empty{padding:7px 10px 9px;font-size:11px;color:var(--text-3);line-height:1.4}
.ph{margin-bottom:20px}
.ph-title{font-size:19px;font-weight:600;letter-spacing:-.3px;color:var(--text);line-height:1.2}
.ph-meta{font-size:11px;color:var(--text-3);margin-top:3px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow)}
.card-hd{padding:12px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-size:12px;font-weight:500;color:var(--text)}
.card-sub{font-size:11px;color:var(--text-3);margin-top:1px}
.card-bd{padding:15px}
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow)}
.kpi{background:var(--bg);padding:14px 16px;position:relative}
.kpi-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin-bottom:5px}
.kpi-val{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.4px;font-variant-numeric:tabular-nums;line-height:1}
.kpi-sub{font-size:10px;color:var(--text-3);margin-top:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:12px}
@media(max-width:1100px){.g3,.g4{grid-template-columns:1fr 1fr}}
@media(max-width:720px){
  .g2,.g3,.g4{grid-template-columns:1fr}
  .sidebar{display:none}
  .content{padding:16px}
  .topbar{padding:0 12px;gap:10px}
  .brand-version{display:none}
  .tb-search{max-width:none;flex:1}
  .kpi-strip{grid-template-columns:repeat(2,1fr)}
  .ph-title{font-size:16px}
  .modal{max-width:100%;margin:0;border-radius:0;max-height:100vh}
  .modal-bg{padding:0;align-items:flex-end}
  .sc{padding:11px 12px}
}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px}
.inp{height:33px;padding:0 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);font-size:12.5px;color:var(--text);outline:none;transition:border-color .15s;width:100%}
.inp:focus{border-color:var(--blue)}
.inp::placeholder{color:var(--text-3)}
.sel{height:33px;padding:0 7px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);font-size:12.5px;color:var(--text);outline:none;width:100%;cursor:pointer}
.sel:focus{border-color:var(--blue)}
.form-row{display:flex;gap:9px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}
.form-row .field{flex:1;min-width:150px}
.btn{height:33px;padding:0 13px;border-radius:var(--r);font-size:12.5px;font-weight:500;border:1px solid var(--border);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-p:hover{background:var(--blue-mid)}
.btn-p:disabled{opacity:.4;cursor:not-allowed}
.btn-d{background:var(--bg);color:var(--text-2)}
.btn-d:hover{border-color:var(--border-strong);color:var(--text)}
.btn-sm{height:26px;padding:0 9px;font-size:11px}
.badge{display:inline-flex;align-items:center;height:18px;padding:0 6px;border-radius:3px;font-size:10.5px;font-weight:500;white-space:nowrap}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-green{background:var(--green-bg);color:var(--green)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-neutral{background:var(--bg-muted);color:var(--text-2)}
.b-purple{background:var(--purple-bg);color:var(--purple)}
.b-teal{background:var(--teal-bg);color:var(--teal)}
.b-industry{background:#ede8fc;color:#3a2880}
.b-nih{background:#e1f5ee;color:#0a5c42}
.b-federal{background:#faeeda;color:#5c3a0a}
.b-other{background:var(--bg-muted);color:var(--text-2)}
@media(prefers-color-scheme:dark){
  .b-industry{background:#2a2060;color:#b0a0f0}
  .b-nih{background:#0a2a1e;color:#60c09a}
  .b-federal{background:#2a1e0a;color:#d4954a}
}
.segs{display:flex;gap:2px;flex-wrap:wrap}
.seg{height:28px;padding:0 11px;border:1px solid var(--border);background:var(--bg);font-size:11.5px;color:var(--text-2);border-radius:var(--r);transition:all .12s;cursor:pointer}
.seg:hover{color:var(--text);border-color:var(--border-strong)}
.seg.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:500}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{border-bottom:1px solid var(--border)}
th{padding:9px 11px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);white-space:nowrap}
td{padding:8px 11px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg-subtle)}
.mono{font-family:var(--mono);font-size:11px;color:var(--blue)}
.tt{position:fixed;pointer-events:none;z-index:800;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;box-shadow:var(--shadow-md);min-width:150px;max-width:220px}
.tt-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:5px;word-break:break-word}
.tt-row{display:flex;justify-content:space-between;gap:14px;font-size:11px;color:var(--text-2);margin-top:2px}
.tt-row span:last-child{font-weight:500;color:var(--text);font-variant-numeric:tabular-nums}
.acp{position:relative}
.acd{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-md);z-index:500;overflow:hidden;max-height:260px;overflow-y:auto}
.ach{padding:5px 11px;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);border-bottom:1px solid var(--border);background:var(--bg-subtle)}
.aci{padding:7px 11px;cursor:pointer;font-size:12.5px;color:var(--text);border-bottom:1px solid var(--border);transition:background .1s}
.aci:last-child{border-bottom:none}
.aci:hover,.aci.hl{background:var(--blue-bg);color:var(--blue)}
.aci-sub{font-size:10.5px;color:var(--text-3);margin-top:1px}
.acf{padding:4px 11px;font-size:10px;color:var(--text-3);background:var(--bg-subtle);border-top:1px solid var(--border)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);width:100%;max-width:780px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-hd{padding:16px 18px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-x{width:26px;height:26px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);font-size:15px;color:var(--text-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;padding:0;transition:all .12s}
.modal-x:hover{color:var(--text);border-color:var(--border-strong)}
.modal-bd{padding:18px}
.ms{margin-bottom:20px}
.ms-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.alert{display:flex;gap:8px;padding:9px 12px;border-radius:var(--r);font-size:12.5px;margin-bottom:14px;border:1px solid}
.alert-info{background:var(--blue-bg);color:var(--blue);border-color:#b5d4f4}
.alert-ok{background:var(--green-bg);color:var(--green);border-color:#c0dd97}
.alert-warn{background:var(--amber-bg);color:var(--amber);border-color:#fac775}
.alert-rate{background:var(--red-bg);color:var(--red);border-color:#f5b8b8;font-weight:500}
.fb{display:flex;height:7px;border-radius:4px;overflow:hidden;margin-bottom:7px;background:var(--bg-muted)}
.fb-seg{transition:width .4s}
.fb-legend{display:flex;flex-wrap:wrap;gap:4px 12px}
.fb-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-2)}
.fb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sc{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px 14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;box-shadow:var(--shadow)}
.sc:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md)}
.sc-rank{position:absolute;top:11px;right:13px;font-size:11px;font-weight:600;color:var(--text-3);font-variant-numeric:tabular-nums}
.sc-name{font-size:12.5px;font-weight:500;color:var(--text);margin-bottom:2px;padding-right:26px;line-height:1.3}
.sc-loc{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.sc-cond{font-size:10.5px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:7px}
.sc-link{font-size:11px;color:var(--blue)}
.rl-item{display:flex;align-items:center;gap:10px;padding:8px 5px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:var(--r);transition:background .1s}
.rl-item:last-child{border-bottom:none}
.rl-item:hover{background:var(--bg-subtle)}
.rl-num{width:20px;text-align:center;font-size:11px;font-weight:600;color:var(--text-3);flex-shrink:0;font-variant-numeric:tabular-nums}
.rl-info{flex:1;min-width:0}
.rl-name{font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rl-meta{font-size:11px;color:var(--text-3);margin-top:1px}
.st-rec{background:var(--green-bg);color:var(--green)}
.st-com{background:var(--blue-bg);color:var(--blue)}
.st-act{background:var(--amber-bg);color:var(--amber)}
.st-def{background:var(--bg-muted);color:var(--text-2)}
#trial-map{height:420px;border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden}
.leaflet-popup-content-wrapper{border-radius:var(--r)!important;box-shadow:var(--shadow-md)!important;border:1px solid var(--border)!important;font-family:var(--font)!important}
.leaflet-popup-tip{display:none}
.bar-r{cursor:pointer;transition:opacity .12s}
.line-dot{cursor:pointer;transition:r .1s,fill .1s}
.ext-links{display:flex;flex-wrap:wrap;gap:6px}
.ext-link{display:inline-flex;align-items:center;gap:5px;height:28px;padding:0 9px;border:1px solid var(--border);border-radius:var(--r);font-size:11.5px;color:var(--text-2);transition:all .12px}
.ext-link:hover{border-color:var(--border-strong);color:var(--text);text-decoration:none}
.spin{display:inline-block;border-radius:50%;border:2px solid var(--border);border-top-color:var(--blue);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:var(--border);margin:14px 0}
.toast{position:fixed;bottom:18px;right:18px;background:var(--text);color:var(--bg);padding:9px 14px;border-radius:var(--r);font-size:12.5px;z-index:2000;box-shadow:var(--shadow-md);pointer-events:none}
.section{animation:fu .16s ease both}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.chip{height:26px;padding:0 9px;border:1px solid var(--border);border-radius:12px;font-size:11.5px;color:var(--text-2);background:var(--bg);transition:all .12px;cursor:pointer}
.chip:hover{border-color:var(--border-strong);color:var(--text)}
.h-bar-row{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:var(--r);cursor:pointer;transition:background .1s}
.h-bar-row:hover{background:var(--bg-subtle)}
.h-bar-label{font-size:11px;color:var(--text-2);width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.h-bar-track{flex:1;height:5px;background:var(--bg-muted);border-radius:3px;overflow:hidden}
.h-bar-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.h-bar-val{font-size:11px;font-weight:500;color:var(--text);min-width:34px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.rate-banner{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--red-bg);border:1px solid #f5b8b8;color:var(--red);padding:10px 18px;border-radius:var(--r-lg);font-size:12.5px;font-weight:500;z-index:2100;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:10px;max-width:480px;text-align:center}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback} = React;

/* ─── Session cache (sessionStorage, 30-min TTL) ────────────────────────────
   Keys are query fingerprints. Each entry: {data, ts}
   sessionStorage is tab-scoped — cleared on tab close, so data stays fresh
   per session without hammering the API on every nav change.
─────────────────────────────────────────────────────────────────────────── */
const CACHE_TTL = 30 * 60 * 1000; // 30 minutes

function cacheKey(obj){ return 'tsi__' + btoa(JSON.stringify(obj)).slice(0,80); }

function cacheGet(key){
  try{
    const raw = sessionStorage.getItem(key);
    if(!raw) return null;
    const {data, ts} = JSON.parse(raw);
    if(Date.now() - ts > CACHE_TTL){ sessionStorage.removeItem(key); return null; }
    return data;
  }catch{ return null; }
}

function cacheSet(key, data){
  try{ sessionStorage.setItem(key, JSON.stringify({data, ts: Date.now()})); }
  catch(e){
    // storage quota exceeded — clear old tsi__ entries and retry once
    try{
      Object.keys(sessionStorage).filter(k=>k.startsWith('tsi__')).forEach(k=>sessionStorage.removeItem(k));
      sessionStorage.setItem(key, JSON.stringify({data, ts: Date.now()}));
    }catch{}
  }
}

/* ─── Rate limiter (ClinicalTrials.gov: ~10 req/sec, ~600/min documented) ─── */
const RATE_WINDOW_MS = 10_000; // 10-second sliding window
const RATE_MAX = 8;            // stay safely under 10/sec burst limit
const _rateTimes = [];
function checkRate(){
  const now=Date.now();
  while(_rateTimes.length && now-_rateTimes[0]>RATE_WINDOW_MS) _rateTimes.shift();
  if(_rateTimes.length>=RATE_MAX) return false;
  _rateTimes.push(now);
  return true;
}

function dateStr(daysAgo){
  const d=new Date();d.setDate(d.getDate()-daysAgo);
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

/* parse cacheKey back to {win, pageSize} so fetchers never rely on stale refs */
function parseCacheKey(key){
  const [w,ps]=key.split('__');
  return{win:w,pageSize:parseInt(ps,10)};
}

function makeDateQuery(win){
  const days=WINDOWS.find(x=>x.key===win)?.days||1;
  return `AREA[LastUpdatePostDate]RANGE[${dateStr(days)},MAX]`;
}

/* retry with exponential backoff */
async function fetchWithRetry(url, retries=3, delay=1200){
  for(let i=0;i<retries;i++){
    try{
      const r=await fetch(url);
      if(r.status===429){fireRateErr();await sleep(delay*(i+1));continue;}
      if(r.status===503||r.status===502){fireApiDown();await sleep(delay*(i+1));continue;}
      if(!r.ok){fireApiErr(r.status);return null;}
      return r;
    }catch(e){
      if(i===retries-1)fireApiDown();
      await sleep(delay*(i+1));
    }
  }
  return null;
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function fetchAll(params={},maxPages=15){
  const ck = cacheKey({fn:'fetchAll', params, maxPages});
  const cached = cacheGet(ck);
  if(cached){ return cached; }

  let all=[],token=null,p=0;
  while(p<maxPages){
    if(!checkRate()){await sleep(1500);}
    const q={format:'json',pageSize:100,...params};
    if(token)q.pageToken=token;
    const r=await fetchWithRetry(`${BASE}/studies?${new URLSearchParams(q)}`);
    if(!r)break;
    const d=await r.json();
    all=all.concat(d.studies||[]);
    if(d.nextPageToken){token=d.nextPageToken;p++;}else break;
  }
  if(all.length) cacheSet(ck, all);
  return all;
}

async function fetchOnePage(params){
  const ck = cacheKey({fn:'fetchOnePage', params});
  const cached = cacheGet(ck);
  if(cached){ return cached; }

  if(!checkRate()){await sleep(1500);}
  const q={format:'json',countTotal:'true',...params};
  const r=await fetchWithRetry(`${BASE}/studies?${new URLSearchParams(q)}`);
  if(!r)return{studies:[],nextToken:null,total:0};
  const d=await r.json();
  const result={studies:d.studies||[],nextToken:d.nextPageToken||null,total:d.totalCount||0};
  if(result.studies.length) cacheSet(ck, result);
  return result;
}

function processSites(studies){
  const map={};
  studies.forEach(s=>{
    const pr=s.protocolSection||{},id=pr.identificationModule||{},st=pr.statusModule||{},sp=pr.sponsorCollaboratorsModule||{},co=pr.conditionsModule||{},de=pr.designModule||{},lo=pr.contactsLocationsModule||{};
    const fc=sp.leadSponsor?.class||'OTHER',sn=sp.leadSponsor?.name||'',cl=(sp.collaborators||[]).map(c=>c.name).filter(Boolean);
    (lo.locations||[]).forEach(loc=>{
      const name=loc.facility||'Unknown',city=loc.city||'Unknown',state=loc.state||'',country=loc.country||'Unknown',k=`${name}|||${city}|||${country}`;
      if(!map[k])map[k]={key:k,name,city,state,country,lat:loc.geoPoint?.lat,lng:loc.geoPoint?.lon,trials:[],sponsors:new Set(),collaborators:new Set(),conditions:new Set(),phases:new Set(),funderClasses:{},statuses:{},totalEnrollment:0,recruitingCount:0,completedCount:0};
      const e=map[k];
      e.trials.push({nctId:id.nctId,title:id.briefTitle||'',status:st.overallStatus||'UNKNOWN',sponsor:sn,funderClass:fc,phases:de.phases||[],enrollment:parseInt(de.enrollmentInfo?.count||0)||0,startDate:st.startDateStruct?.date||''});
      e.sponsors.add(sn);cl.forEach(c=>e.collaborators.add(c));
      (co.conditions||[]).forEach(c=>e.conditions.add(c));(de.phases||[]).forEach(p=>e.phases.add(p));
      e.funderClasses[fc]=(e.funderClasses[fc]||0)+1;
      const status=st.overallStatus||'UNKNOWN';e.statuses[status]=(e.statuses[status]||0)+1;
      if(status==='RECRUITING')e.recruitingCount++;if(status==='COMPLETED')e.completedCount++;
      e.totalEnrollment+=parseInt(de.enrollmentInfo?.count||0)||0;
    });
  });
  return Object.values(map).map(s=>({...s,sponsors:[...s.sponsors].filter(Boolean),collaborators:[...s.collaborators].filter(Boolean),conditions:[...s.conditions],phases:[...s.phases],trialCount:s.trials.length,dominantFunder:Object.entries(s.funderClasses).sort((a,b)=>b[1]-a[1])[0]?.[0]||'OTHER'})).sort((a,b)=>b.trialCount-a.trialCount);
}

function classifyUpdate(study){
  const pr=study.protocolSection||{},st=pr.statusModule||{},id=pr.identificationModule||{},de=pr.designModule||{},co=pr.conditionsModule||{},lo=pr.contactsLocationsModule||{};
  const status=st.overallStatus||'UNKNOWN';
  const posted=st.studyFirstPostDateStruct?.date||'';
  const lastUpdate=st.lastUpdatePostDateStruct?.date||'';
  const phases=de.phases||[];
  const locations=(lo.locations||[]).length;
  const postedRecently=posted&&posted>=dateStr(7);
  let type;
  if(postedRecently)type='new_trial';
  else if(status==='RECRUITING')type='recruiting';
  else if(status==='COMPLETED')type='completed';
  else if(status==='TERMINATED')type='terminated';
  else if(status==='ACTIVE_NOT_RECRUITING')type='active';
  else type='updated';
  return{nctId:id.nctId,title:id.briefTitle||'Untitled',type,status,phases,conditions:(co.conditions||[]).slice(0,2),locations,lastUpdate,posted};
}

const Donut=({data,size=110,onCk,activeKey})=>{
  const {tt,show,move,hide}=useTT();
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  const cx=size/2,cy=size/2,r=size*.38,ir=size*.22;
  let angle=-Math.PI/2;
  const slices=data.map(d=>{
    const sw=(d.value/total)*Math.PI*2,a1=angle,a2=angle+sw;angle=a2;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const ix1=cx+ir*Math.cos(a1),iy1=cy+ir*Math.sin(a1),ix2=cx+ir*Math.cos(a2),iy2=cy+ir*Math.sin(a2);
    const large=sw>Math.PI?1:0;
    const path=`M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} L${ix2},${iy2} A${ir},${ir} 0 ${large} 0 ${ix1},${iy1} Z`;
    return{...d,path,midA:(a1+a2)/2,pct:(d.value/total*100)};
  });
  const active=slices.find(s=>s.key===activeKey);
  return(
    <div style={{position:'relative',display:'inline-block',flexShrink:0}} onMouseMove={move}>
      <TT {...tt}/>
      <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size,display:'block',overflow:'visible'}}>

          const act=activeKey===s.key,off=act?3.5:0;

const AutoInput=({value,onChange,onSelect,onEnter,placeholder,suggestions,loading,label})=>{
  const [open,setOpen]=useState(false);const [hl,setHl]=useState(-1);const ref=useRef(null);
  const filtered=useMemo(()=>{if(value.length<3)return[];const q=value.toLowerCase();return suggestions.filter(s=>s.toLowerCase().includes(q)).slice(0,9);},[value,suggestions]);
  useEffect(()=>{setOpen(filtered.length>0);setHl(-1);},[filtered.length]);
  useEffect(()=>{const fn=e=>{if(!ref.current?.contains(e.target))setOpen(false);};document.addEventListener('mousedown',fn);return()=>document.removeEventListener('mousedown',fn);},[]);
  const pick=s=>{onSelect(s);setOpen(false);setHl(-1);};
  const onKey=e=>{
    if(e.key==='ArrowDown'){e.preventDefault();setHl(h=>Math.min(h+1,filtered.length-1));}
    else if(e.key==='ArrowUp'){e.preventDefault();setHl(h=>Math.max(h-1,-1));}
    else if(e.key==='Enter'){if(hl>=0&&filtered[hl])pick(filtered[hl]);else if(onEnter)onEnter();}
    else if(e.key==='Escape')setOpen(false);
  };
  return(
    <div ref={ref} className="acp field" style={{flex:1}}>
      {label&&<label>{label}</label>}
      <div style={{position:'relative'}}>
        <input className="inp" value={value} onChange={e=>onChange(e.target.value)} onKeyDown={onKey} onFocus={()=>{if(filtered.length)setOpen(true);}} placeholder={placeholder} style={{paddingRight:value?28:9}}/>
        {loading&&<span style={{position:'absolute',right:7,top:'50%',transform:'translateY(-50%)'}}><Spin s={13}/></span>}
        {!loading&&value&&<button onMouseDown={e=>{e.preventDefault();onChange('');setOpen(false);}} style={{position:'absolute',right:0,top:0,height:'100%',width:28,background:'none',border:'none',color:'var(--text-3)',fontSize:15,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>}
      </div>
      {open&&filtered.length>0&&(
        <div className="acd">
          <div className="ach">{filtered.length} suggestion{filtered.length!==1?'s':''}</div>
          {filtered.map((s,i)=><div key={s} className={`aci${i===hl?' hl':''}`} onMouseDown={e=>{e.preventDefault();pick(s);}}>{s}</div>)}
          <div className="acf">↑ ↓ navigate · Enter select</div>
        </div>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════════════════════════════════════════
   RECENT UPDATES — fixed version
   
   Key fixes:
   1. fetchOnePage now always sends countTotal=true → totalCount works
   2. The fetch effect derives win+pageSize directly from the cacheKey string,
      never from refs — eliminates the stale-closure bug causing same data
      across all windows.
   3. goTo also derives win+pageSize from cacheKey string directly.
══════════════════════════════════════════════════════════════════════════════ */
const RecentUpdates=({initialWin})=>{
  const [win,setWin]=useState(initialWin||'24h');
  const [pageSize,setPageSize]=useState(20);
  const [typeFilter,setTypeFilter]=useState(null);
  const [cache,setCache]=useState({});

  const cacheKey=`${win}__${pageSize}`;

  const emptyEntry=()=>({total:0,typeCounts:{},pages:[],tokens:[''],loading:false,currentPage:0,loaded:false});

  /* Ensure an entry exists and kick off loading when cacheKey changes */
  useEffect(()=>{
    setTypeFilter(null);
    setCache(prev=>{
      const existing=prev[cacheKey];
      if(existing?.loaded||existing?.loading) return prev;
      return{...prev,[cacheKey]:{...emptyEntry(),loading:true}};
    });
  },[cacheKey]);

  /* Fire the actual API call whenever an entry flips to loading=true with no pages */
  useEffect(()=>{
    const entry=cache[cacheKey];
    if(!entry?.loading||entry.pages.length>0) return;

    /* Derive win and pageSize from the key itself — no stale closures */
    const {win:w,pageSize:ps}=parseCacheKey(cacheKey);
    const capturedKey=cacheKey;

    (async()=>{
      const {studies,nextToken,total}=await fetchOnePage({
        'query.term':makeDateQuery(w),
        'sort':'LastUpdatePostDate:desc',
        'pageSize':ps,
      });
      const classified=studies.map(classifyUpdate);
      const tc={};classified.forEach(u=>{tc[u.type]=(tc[u.type]||0)+1;});
      setCache(prev=>({
        ...prev,
        [capturedKey]:{
          ...prev[capturedKey],
          total,
          typeCounts:tc,
          pages:[classified],
          tokens:['',nextToken||null],
          loading:false,
          currentPage:0,
          loaded:true,
        },
      }));
    })();
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[cache[cacheKey]?.loading]);

  const goTo=useCallback(async(idx)=>{
    if(idx<0)return;
    const {win:w,pageSize:ps}=parseCacheKey(cacheKey);
    const capturedKey=cacheKey;
    const entry=cache[capturedKey]||emptyEntry();

    if(entry.pages[idx]){
      setCache(prev=>({...prev,[capturedKey]:{...prev[capturedKey],currentPage:idx}}));
      return;
    }
    const token=entry.tokens[idx];
    if(!token&&idx>0)return;

    setCache(prev=>({...prev,[capturedKey]:{...prev[capturedKey],loading:true}}));

    const params={
      'query.term':makeDateQuery(w),
      'sort':'LastUpdatePostDate:desc',
      'pageSize':ps,
    };
    if(token)params.pageToken=token;

    const {studies,nextToken,total}=await fetchOnePage(params);
    const classified=studies.map(classifyUpdate);

    setCache(prev=>{
      const cur=prev[capturedKey]||emptyEntry();
      const pages=[...cur.pages];pages[idx]=classified;
      const tokens=[...cur.tokens];if(nextToken)tokens[idx+1]=nextToken;
      return{...prev,[capturedKey]:{...cur,pages,tokens,total:total||cur.total,loading:false,currentPage:idx}};
    });
  },[cache,cacheKey]);

  useEffect(()=>{if(initialWin)setWin(initialWin);},[initialWin]);

  const c=cache[cacheKey]||emptyEntry();
  const currentPage=c.currentPage||0;
  const currentData=c.pages[currentPage]||[];
  const hasNext=!!(c.tokens[currentPage+1]);
  const hasPrev=currentPage>0;
  const filtered=typeFilter?currentData.filter(u=>u.type===typeFilter):currentData;

  const winLabel=WINDOWS.find(w=>w.key===win)?.label?.toLowerCase()||'';

  return(
    <div className="section">
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:16,flexWrap:'wrap'}}>
        <div className="segs">
          {WINDOWS.map(w=>(
            <button key={w.key} className={`seg${win===w.key?' on':''}`} onClick={()=>setWin(w.key)}>{w.label}</button>
          ))}
        </div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,color:'var(--text-3)'}}>Per page</span>
          <div className="segs">
            {PAGE_SIZES.map(n=>(
              <button key={n} className={`seg${pageSize===n?' on':''}`} style={{height:26,padding:'0 9px',fontSize:11}}
                onClick={()=>setPageSize(n)}>{n}</button>
            ))}
          </div>
        </div>
      </div>

      {/* ── KPI: 2 cards (window total + page breakdown) ── */}
      {(()=>{
        const pageCounts=Object.keys(UPDATE_META).map(t=>({
          key:t,...UPDATE_META[t],val:currentData.filter(u=>u.type===t).length
        })).filter(d=>d.val>0);
        return(
          <>
            {/* Row 1: single window total */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:1,background:'var(--border)',border:'1px solid var(--border)',borderRadius:'var(--r-lg)',overflow:'hidden',boxShadow:'var(--shadow)',marginBottom:6}}>
              <div className="kpi">
                <div className="kpi-label">Total in window</div>
                <div className="kpi-val">{c.loading&&!c.loaded?<Spin s={14}/>:c.total>0?c.total.toLocaleString():'0'}</div>
                <div className="kpi-sub">{WINDOWS.find(w=>w.key===win)?.label}</div>
              </div>
            </div>
            {/* Row 2: per-type breakdown for this page only */}
            {currentData.length>0&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:9.5,fontWeight:600,textTransform:'uppercase',letterSpacing:'.6px',color:'var(--text-3)',marginBottom:5,paddingLeft:2}}>
                  This page · {currentData.length} entries
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:1,background:'var(--border)',border:'1px solid var(--border)',borderRadius:'var(--r-lg)',overflow:'hidden',boxShadow:'var(--shadow)'}}>
                  {pageCounts.map(d=>(
                    <div key={d.key} className="kpi"

                        {d.label}

                      <div className="kpi-sub">{typeFilter===d.key?'← clear filter':'click to filter'}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </>
        );

        </div>
      )}

      {!c.loading&&currentData.length>0&&(

            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'6px 10px',background:'var(--blue-bg)',border:'1px solid var(--border)',borderRadius:'var(--r)',fontSize:12}}>
              <span style={{color:'var(--blue)',fontWeight:500}}>Showing:</span>

              <span style={{color:'var(--text-3)'}}>({filtered.length} on this page)</span>

            </div>

          <div className="card">
            <div className="card-hd">
              <div>
                <div className="card-title">Study updates</div>
                <div className="card-sub">Sorted by last update date, newest first · {winLabel}</div>
              </div>
              <span style={{fontSize:11,color:'var(--text-3)'}}>
                Page {currentPage+1}{c.total>0?` of ~${Math.ceil(c.total/pageSize).toLocaleString()}`:''}
              </span>
            </div>
            <div>
              {filtered.map((u,i)=>(

                  onMouseEnter={e=>e.currentTarget.style.background='var(--bg-subtle)'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}

                  <div style={{width:8,height:8,borderRadius:'50%',background:(UPDATE_META[u.type]||UPDATE_META.updated).dot,flexShrink:0,marginTop:4}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12.5,fontWeight:500,color:'var(--text)',lineHeight:1.35,marginBottom:4,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{u.title}</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:3,marginBottom:5}}>
                      <span className={`badge ${(UPDATE_META[u.type]||UPDATE_META.updated).cls}`}>{(UPDATE_META[u.type]||UPDATE_META.updated).label}</span>
                      {u.phases.length>0&&<span className="badge b-neutral">{u.phases[0].replace('_',' ')}</span>}
                      {u.conditions.map(c=><span key={c} className="badge b-neutral">{c}</span>)}
                      {u.locations>0&&<span className="badge b-neutral">{u.locations} site{u.locations!==1?'s':''}</span>}

                style={{opacity:!hasPrev||c.loading?.4:1,cursor:!hasPrev||c.loading?'not-allowed':'pointer'}}>← Previous</button>
              <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text-2)'}}>
                {c.loading?<Spin s={14}/>:<>
                  <span>Page <strong>{currentPage+1}</strong></span>
                  {c.total>0&&<span style={{color:'var(--text-3)'}}>— {c.total.toLocaleString()} total results</span>}
                </>}
              </div>
              <button className="btn btn-d btn-sm" disabled={!hasNext||c.loading} onClick={()=>goTo(currentPage+1)}
                style={{opacity:!hasNext||c.loading?.4:1,cursor:!hasNext||c.loading?'not-allowed':'pointer'}}>Next →</button>
            </div>
          </div>

      {!c.loading&&c.loaded&&currentData.length===0&&(
        <div style={{textAlign:'center',padding:'48px 0',color:'var(--text-3)',fontSize:12.5}}>
          No updates found for this time window.
        </div>

      <div style={{marginTop:12,fontSize:11,color:'var(--text-3)',lineHeight:1.6}}>
        Data from ClinicalTrials.gov · Total count from API totalCount field · Type breakdown reflects the first page loaded.
      </div>
    </div>
  );
};

/* ── DASHBOARD ───────────────────────────────────────────────────────────────── */
const Dashboard=({data,onOpen,setSection,onFilterChange})=>{
  const [filters,setFilters]=useState({status:new Set(),phase:new Set(),funder:null,country:new Set(),year:new Set()});
  const toggle=(dim,key)=>setFilters(f=>{
    if(dim==='funder'){return{...f,funder:f.funder===key?null:key};}
    const s=new Set(f[dim]);if(s.has(key))s.delete(key);else s.add(key);return{...f,[dim]:s};
  });
  const clearAll=()=>setFilters({status:new Set(),phase:new Set(),funder:null,country:new Set(),year:new Set()});
  const anyFilter=filters.status.size>0||filters.phase.size>0||filters.funder||filters.country.size>0||filters.year.size>0;
  const filtered=useMemo(()=>{
    if(!data.length)return[];let r=data;
    if(filters.status.size)r=r.filter(s=>[...filters.status].some(st=>s.statuses[st]>0));
    if(filters.phase.size) r=r.filter(s=>[...filters.phase].some(ph=>s.phases.includes(ph)));
    if(filters.funder)     r=r.filter(s=>s.dominantFunder===filters.funder||(s.funderClasses[filters.funder]||0)>0);
    if(filters.country.size)r=r.filter(s=>filters.country.has(s.country));
    if(filters.year.size)  r=r.filter(s=>s.trials.some(t=>t.startDate&&filters.year.has(t.startDate.slice(0,4))));
    return r;
  },[data,filters]);
  const derived=useMemo(()=>{
    const pool=filtered.length?filtered:data;if(!pool.length)return null;
    const total=pool.reduce((s,x)=>s+x.trialCount,0)||1;
    const rec=pool.filter(s=>s.recruitingCount>0).length;
    const enroll=pool.reduce((s,x)=>s+x.totalEnrollment,0);
    const completed=pool.reduce((s,x)=>s+x.completedCount,0);
    const sc={};pool.forEach(s=>Object.entries(s.statuses).forEach(([k,v])=>{sc[k]=(sc[k]||0)+v;}));
    const statusDonut=Object.entries(sc).sort((a,b)=>b[1]-a[1]).slice(0,7).map(([k,v])=>({key:k,label:k.replace(/_/g,' '),value:v,color:SC_COLORS[k]||'#888'}));
    const pc={};pool.forEach(s=>s.phases.forEach(p=>{pc[p]=(pc[p]||0)+1;}));
    const phaseBar=PHASES.filter(p=>pc[p]).map(p=>({key:p,label:p.replace('_',' '),shortLabel:p.replace('EARLY_PHASE1','E.Ph1').replace('PHASE','Ph'),value:pc[p],color:PH_COL[p]}));
    const fc={};pool.forEach(s=>Object.entries(s.funderClasses).forEach(([k,v])=>{fc[k]=(fc[k]||0)+v;}));
    const funderDonut=Object.entries(fc).map(([k,v])=>({key:k,label:(FM[k]||FM.OTHER).label,value:v,color:(FM[k]||FM.OTHER).color}));
    const yc={};pool.forEach(s=>s.trials.forEach(t=>{if(t.startDate){const y=t.startDate.slice(0,4);if(parseInt(y)>=2014&&parseInt(y)<=2026)yc[y]=(yc[y]||0)+1;}}));
    const yearLine=Object.entries(yc).sort((a,b)=>a[0]-b[0]).map(([y,v])=>({key:y,label:y,value:v}));
    const cc={};pool.forEach(s=>{cc[s.country]=(cc[s.country]||0)+s.trialCount;});
    const topCountries=Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([k,v])=>({key:k,label:k,value:v}));
    return{total,rec,enroll,completed,statusDonut,phaseBar,funderDonut,yearLine,topCountries,sites:pool.length,countries:new Set(pool.map(s=>s.country)).size};
  },[filtered,data]);
  useEffect(()=>{
    const labels=[...filters.status].concat([...filters.phase]).concat(filters.funder?[filters.funder]:[]).concat([...filters.country]).concat([...filters.year]);
    onFilterChange&&onFilterChange(anyFilter?filtered:null,anyFilter?labels.join(', '):'all sites');
  },[filtered,anyFilter]);
  if(!data.length)return<div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'80px 0',gap:14,color:'var(--text-3)'}}><Spin s={32}/><span style={{fontSize:12.5}}>Loading data from ClinicalTrials.gov…</span></div>;
  if(!derived)return null;
  const {total,rec,enroll,completed,statusDonut,phaseBar,funderDonut,yearLine,topCountries,sites,countries}=derived;
  return(
    <div className="section">
      <div className="kpi-strip">
        <div className="kpi"><div className="kpi-label">Sites</div><div className="kpi-val">{sites.toLocaleString()}</div><div className="kpi-sub">{anyFilter?'matching filter':'unique facilities'}</div></div>
        <div className="kpi"><div className="kpi-label">Trial records</div><div className="kpi-val">{total.toLocaleString()}</div></div>
        <div className="kpi"><div className="kpi-label">Recruiting now</div><div className="kpi-val">{rec.toLocaleString()}</div></div>
        <div className="kpi"><div className="kpi-label">Countries</div><div className="kpi-val">{countries}</div></div>
        <div className="kpi"><div className="kpi-label">Enrollment target</div><div className="kpi-val">{enroll.toLocaleString()}</div></div>
        <div className="kpi"><div className="kpi-label">Completion rate</div><div className="kpi-val">{total>0?(completed/total*100).toFixed(0):0}%</div></div>
      </div>
      {anyFilter&&(
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:14,padding:'7px 11px',background:'var(--blue-bg)',border:'1px solid var(--border)',borderRadius:'var(--r)',fontSize:12,flexWrap:'wrap'}}>
          <span style={{color:'var(--blue)',fontWeight:500,marginRight:2}}>Active filters</span>
          {[...filters.status].map(k=><button key={'s'+k} className="badge b-neutral" onClick={()=>toggle('status',k)} style={{cursor:'pointer',border:'1px solid var(--border-strong)',display:'inline-flex',alignItems:'center',gap:4,height:20}}>{k.replace(/_/g,' ')} ×</button>)}
          {[...filters.phase].map(k=><button key={'p'+k} className="badge b-neutral" onClick={()=>toggle('phase',k)} style={{cursor:'pointer',border:'1px solid var(--border-strong)',display:'inline-flex',alignItems:'center',gap:4,height:20}}>{k.replace(/_/g,' ')} ×</button>)}
          {filters.funder&&<button className="badge b-neutral" onClick={()=>toggle('funder',filters.funder)} style={{cursor:'pointer',border:'1px solid var(--border-strong)',display:'inline-flex',alignItems:'center',gap:4,height:20}}>{(FM[filters.funder]||FM.OTHER).label} ×</button>}
          {[...filters.country].map(k=><button key={'c'+k} className="badge b-neutral" onClick={()=>toggle('country',k)} style={{cursor:'pointer',border:'1px solid var(--border-strong)',display:'inline-flex',alignItems:'center',gap:4,height:20}}>{k} ×</button>)}
          {[...filters.year].map(k=><button key={'y'+k} className="badge b-neutral" onClick={()=>toggle('year',k)} style={{cursor:'pointer',border:'1px solid var(--border-strong)',display:'inline-flex',alignItems:'center',gap:4,height:20}}>{k} ×</button>)}
          <span style={{color:'var(--text-3)'}}>→ {filtered.length.toLocaleString()} sites</span>
          <button className="btn btn-d btn-sm" style={{marginLeft:'auto'}} onClick={clearAll}>Clear all</button>
        </div>
      )}
      <div className="g3" style={{marginBottom:14}}>
        <div className="card">
          <div className="card-hd"><div><div className="card-title">Recruitment status</div><div className="card-sub">Click to filter</div></div>{filters.status.size>0&&<button className="btn btn-d btn-sm" onClick={()=>setFilters(f=>({...f,status:new Set()}))}>Clear</button>}</div>
          <div className="card-bd" style={{display:'flex',gap:12,alignItems:'flex-start'}}>
            <Donut data={statusDonut} size={106} activeKey={filters.status.size===1?[...filters.status][0]:null} onCk={s=>toggle('status',s.key)}/>
            <div style={{flex:1,minWidth:0}}>
              {statusDonut.map(d=>{const isAct=filters.status.has(d.key);return(<div key={d.key} onClick={()=>toggle('status',d.key)} style={{display:'flex',alignItems:'center',gap:5,padding:'3px 4px',borderRadius:4,cursor:'pointer',opacity:filters.status.size&&!isAct?.4:1,background:isAct?'var(--bg-subtle)':'transparent',transition:'opacity .12s'}}><span style={{width:6,height:6,borderRadius:'50%',background:d.color,flexShrink:0}}/><span style={{flex:1,fontSize:10.5,color:'var(--text-2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.label}</span><span style={{fontSize:10.5,fontWeight:500,fontVariantNumeric:'tabular-nums',flexShrink:0}}>{(d.value/total*100).toFixed(0)}%</span></div>);})}
            </div>
          </div>
        </div>
        <div className="card">
          <div className="card-hd"><div><div className="card-title">Sites by phase</div><div className="card-sub">Click to filter</div></div>{filters.phase.size>0&&<button className="btn btn-d btn-sm" onClick={()=>setFilters(f=>({...f,phase:new Set()}))}>Clear</button>}</div>
          <div className="card-bd"><BarChart data={phaseBar} h={116} activeKeys={filters.phase} onCk={b=>toggle('phase',b.key)}/></div>
        </div>
        <div className="card">
          <div className="card-hd"><div><div className="card-title">Funding source</div></div>{filters.funder&&<button className="btn btn-d btn-sm" onClick={()=>setFilters(f=>({...f,funder:null}))}>Clear</button>}</div>
          <div className="card-bd" style={{display:'flex',gap:12,alignItems:'flex-start'}}>
            <Donut data={funderDonut} size={106} activeKey={filters.funder} onCk={s=>toggle('funder',s.key)}/>
            <div style={{flex:1,minWidth:0}}>{funderDonut.map(d=>{const t=funderDonut.reduce((a,x)=>a+x.value,0)||1;return(<div key={d.key} onClick={()=>toggle('funder',d.key)} style={{display:'flex',alignItems:'center',gap:5,padding:'3px 4px',borderRadius:4,cursor:'pointer',opacity:filters.funder&&filters.funder!==d.key?.38:1,background:filters.funder===d.key?'var(--bg-subtle)':'transparent',transition:'opacity .12s'}}><span style={{width:6,height:6,borderRadius:'50%',background:d.color,flexShrink:0}}/><span style={{flex:1,fontSize:10.5,color:'var(--text-2)'}}>{d.label}</span><span style={{fontSize:10.5,fontWeight:500,fontVariantNumeric:'tabular-nums',flexShrink:0}}>{(d.value/t*100).toFixed(0)}%</span></div>);})}</div>
          </div>
        </div>
      </div>
      <div className="g2" style={{marginBottom:14}}>
        <div className="card">
          <div className="card-hd"><div><div className="card-title">Trial starts by year</div><div className="card-sub">Click to filter</div></div>{filters.year.size>0&&<button className="btn btn-d btn-sm" onClick={()=>setFilters(f=>({...f,year:new Set()}))}>Clear</button>}</div>
          <div className="card-bd"><LineChart data={yearLine} h={200} color="var(--blue)" activeKeys={filters.year} onCk={p=>toggle('year',p.key)}/></div>
        </div>
        <div className="card">
          <div className="card-hd"><div><div className="card-title">Top 10 countries</div><div className="card-sub">Click to filter</div></div>{filters.country.size>0&&<button className="btn btn-d btn-sm" onClick={()=>setFilters(f=>({...f,country:new Set()}))}>Clear</button>}</div>
          <div className="card-bd"><HBar data={topCountries} onCk={d=>toggle('country',d.key)} activeKeys={filters.country}/></div>
        </div>
      </div>
      <div className="card">
        <div className="card-hd"><div><div className="card-title">Top sites{anyFilter?' — filtered':''}</div><div className="card-sub">{anyFilter?`${filtered.length} sites match`:'Ranked by total trial participation'}</div></div><button className="btn btn-d btn-sm" onClick={()=>setSection('topSites')}>View all →</button></div>
        <div className="card-bd" style={{padding:'3px 14px'}}>
          {(anyFilter?filtered:data).slice(0,10).map((s,i)=>(
            <div key={s.key} className="rl-item" onClick={()=>onOpen(s)}>
              <span className="rl-num">{i+1}</span>
              <div className="rl-info"><div className="rl-name">{s.name}</div><div className="rl-meta">{s.city}, {s.country}</div></div>
              <div style={{display:'flex',gap:3,flexShrink:0}}><span className="badge b-blue">{s.trialCount.toLocaleString()}</span>{s.recruitingCount>0&&<span className="badge b-green">{s.recruitingCount}</span>}<FB fc={s.dominantFunder}/></div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* MAP */
const MapSection=({data,onOpen})=>{
  const mapRef=useRef(null);const leafRef=useRef(null);const markersRef=useRef(null);
  const countryData=useMemo(()=>{const cc={},cs={};data.forEach(s=>{cc[s.country]=(cc[s.country]||0)+s.trialCount;if(!cs[s.country])cs[s.country]=[];cs[s.country].push(s);});return{counts:cc,sites:cs};},[data]);
  const sitePoints=useMemo(()=>data.filter(s=>s.lat&&s.lng).slice(0,800),[data]);
  const [view,setView]=useState('sites');const [selectedCountry,setSelectedCountry]=useState(null);const [mapReady,setMapReady]=useState(false);
  useEffect(()=>{
    if(!mapRef.current||leafRef.current)return;
    const map=L.map(mapRef.current,{center:[20,0],zoom:2});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap contributors'}).addTo(map);
    leafRef.current=map;setMapReady(true);
    return()=>{map.remove();leafRef.current=null;};
  },[]);
  useEffect(()=>{
    if(!leafRef.current||!mapReady||!data.length)return;
    const map=leafRef.current;
    if(markersRef.current){markersRef.current.forEach(m=>m.remove());markersRef.current=null;}
    const markers=[];
    if(view==='sites'){
      sitePoints.forEach(site=>{
        const r=Math.max(4,Math.min(18,4+site.trialCount*.08));
        const c=L.circleMarker([site.lat,site.lng],{radius:r,fillColor:site.recruitingCount>0?SC_COLORS.RECRUITING:'#2471a3',color:'#fff',weight:1,opacity:.9,fillOpacity:.75});
        c.bindPopup(`<div style="font-family:-apple-system,sans-serif;font-size:12px;min-width:180px"><div style="font-weight:600;margin-bottom:4px">${site.name}</div><div style="color:#666;margin-bottom:6px">${site.city}, ${site.country}</div><div style="display:flex;gap:3px"><span style="background:#e6f1fb;color:#1a5276;padding:1px 6px;border-radius:3px;font-size:11px">${site.trialCount} trials</span>${site.recruitingCount>0?`<span style="background:#eaf5ee;color:#1a6b3a;padding:1px 6px;border-radius:3px;font-size:11px">${site.recruitingCount} recruiting</span>`:''}</div></div>`,{maxWidth:240});
        c.addTo(map);markers.push(c);
      });
    } else {
      const cc={'United States':[37.09,-95.71],'China':[35.86,104.19],'United Kingdom':[55.37,-3.43],'Germany':[51.16,10.45],'France':[46.22,2.21],'Canada':[56.13,-106.34],'Japan':[36.2,138.25],'Italy':[41.87,12.56],'Spain':[40.46,-3.74],'Australia':[-25.27,133.77],'Netherlands':[52.13,5.29],'Belgium':[50.50,4.46],'Switzerland':[46.81,8.22],'Israel':[31.04,34.85],'South Korea':[35.90,127.76],'Brazil':[-14.23,-51.92],'India':[20.59,78.96],'Poland':[51.91,19.14],'Denmark':[56.26,9.50],'Sweden':[60.12,18.64]};
      Object.entries(countryData.counts).slice(0,40).forEach(([country,cnt])=>{
        const coords=cc[country];if(!coords)return;
        const r=Math.max(6,Math.min(30,6+cnt*.002));
        const c=L.circleMarker(coords,{radius:r,fillColor:'#1a5276',color:'#fff',weight:1.5,opacity:.8,fillOpacity:.55});
        c.bindPopup(`<div style="font-family:-apple-system,sans-serif;font-size:12px"><div style="font-weight:600;margin-bottom:4px">${country}</div><div style="color:#666">${cnt.toLocaleString()} trial records</div><div style="color:#666">${(countryData.sites[country]||[]).length.toLocaleString()} sites</div></div>`,{maxWidth:200});
        c.on('click',()=>setSelectedCountry(country));c.addTo(map);markers.push(c);
      });
    }
    markersRef.current=markers;
  },[data,view,mapReady,sitePoints,countryData]);
  const countrySites=selectedCountry?data.filter(s=>s.country===selectedCountry).slice(0,6):[];
  return(
    <div className="section">
      <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center',flexWrap:'wrap'}}>
        <div className="segs">
          <button className={`seg${view==='sites'?' on':''}`} onClick={()=>setView('sites')}>Site locations</button>
          <button className={`seg${view==='heatmap'?' on':''}`} onClick={()=>setView('heatmap')}>Country bubbles</button>
        </div>
        <div style={{display:'flex',gap:12,marginLeft:'auto',fontSize:11,color:'var(--text-2)',alignItems:'center'}}>
          <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:10,height:10,borderRadius:'50%',background:SC_COLORS.RECRUITING,display:'inline-block'}}/> Recruiting</span>
          <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:10,height:10,borderRadius:'50%',background:'#2471a3',display:'inline-block'}}/> Other</span>
        </div>
      </div>
      <div id="trial-map" ref={mapRef}/>
      {selectedCountry&&view==='heatmap'&&countrySites.length>0&&(
        <div className="card" style={{marginTop:12}}>

const SearchSection=({type,onOpen,onFilterChange})=>{
  const [q,setQ]=useState('');const [phase,setPhase]=useState('');const [status,setStatus]=useState('');
  const [res,setRes]=useState(null);const [loading,setLoading]=useState(false);
  const sugg=type==='drug'?DRUGS:DISEASES;
  const doSearch=async(qv=q)=>{
    if(!qv.trim())return;setLoading(true);
    const params=type==='drug'?{'query.intr':qv}:{'query.cond':qv};
    if(phase)params['filter.phase']=phase;if(status)params['filter.overallStatus']=status;
    const studies=await fetchAll(params,10);const sites=processSites(studies);
    setRes({sites,q:qv,total:studies.length});
    onFilterChange&&onFilterChange(sites,`${type==='drug'?'drug':'disease'}: ${qv}`);
    setLoading(false);
  };
  return(
    <div className="section">
      <div className="form-row">
        <AutoInput value={q} onChange={setQ} onSelect={v=>{setQ(v);doSearch(v);}} onEnter={()=>doSearch()} placeholder={type==='drug'?'e.g. Pembrolizumab…':"e.g. Breast Cancer…"} suggestions={sugg} loading={loading} label={type==='drug'?'Drug or intervention':'Disease or condition'}/>
        <div className="field" style={{minWidth:135}}><label>Phase</label><select className="sel" value={phase} onChange={e=>setPhase(e.target.value)}><option value="">Any phase</option>{PHASES.map(p=><option key={p} value={p}>{p.replace(/_/g,' ')}</option>)}</select></div>
        <div className="field" style={{minWidth:160}}><label>Status</label><select className="sel" value={status} onChange={e=>setStatus(e.target.value)}><option value="">Any status</option><option value="RECRUITING">Recruiting</option><option value="COMPLETED">Completed</option><option value="ACTIVE_NOT_RECRUITING">Active, not recruiting</option></select></div>
        <button className="btn btn-p" onClick={()=>doSearch()} disabled={loading||!q.trim()} style={{alignSelf:'flex-end'}}>{loading?<><Spin s={13}/>Searching</>:'Search'}</button>
      </div>
      {!res&&!loading&&(
        <div>
          <div style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'.5px',color:'var(--text-3)',marginBottom:7}}>{type==='drug'?'Popular drugs & interventions':'Common conditions'}</div>
          <div className="chips">{sugg.slice(0,16).map(s=><button key={s} className="chip" onClick={()=>{setQ(s);doSearch(s);}}>{s}</button>)}</div>

            <div className="kpi"><div className="kpi-label">Enrollment target</div><div className="kpi-val">{res.sites.reduce((a,s)=>a+s.totalEnrollment,0).toLocaleString()}</div></div>

const Compare=({data,onOpen})=>{
  const [q1,setQ1]=useState('');const [q2,setQ2]=useState('');const [s1,setS1]=useState(null);const [s2,setS2]=useState(null);const [err,setErr]=useState('');
  const names=useMemo(()=>data.map(s=>s.name),[data]);
  const doCompare=()=>{
    const r1=data.find(s=>s.name.toLowerCase().includes(q1.toLowerCase()));
    const r2=data.find(s=>s.name.toLowerCase().includes(q2.toLowerCase()));
    if(!r1||!r2){setErr(`${!r1?'"'+q1+'" ':''} ${!r2?'"'+q2+'" ':''} not found.`);return;}
    setErr('');setS1(r1);setS2(r2);
  };
  const metrics=s1&&s2?[{l:'Total trials',v1:s1.trialCount,v2:s2.trialCount},{l:'Recruiting',v1:s1.recruitingCount,v2:s2.recruitingCount},{l:'Completed',v1:s1.completedCount,v2:s2.completedCount},{l:'Sponsors',v1:s1.sponsors.length,v2:s2.sponsors.length},{l:'Conditions',v1:s1.conditions.length,v2:s2.conditions.length},{l:'Enrollment target',v1:s1.totalEnrollment,v2:s2.totalEnrollment}]:[];
  return(
    <div className="section">
      <div style={{display:'grid',gridTemplateColumns:'1fr 46px 1fr',gap:14,alignItems:'flex-end',marginBottom:14}}>
        <AutoInput value={q1} onChange={setQ1} onSelect={setQ1} onEnter={doCompare} suggestions={names} placeholder="e.g. Johns Hopkins…" label="Site 1"/>
        <div style={{width:46,height:33,border:'1px solid var(--border)',borderRadius:'var(--r)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600,color:'var(--text-3)',background:'var(--bg-subtle)',flexShrink:0}}>vs</div>
        <AutoInput value={q2} onChange={setQ2} onSelect={setQ2} onEnter={doCompare} suggestions={names} placeholder="e.g. Mayo Clinic…" label="Site 2"/>
      </div>
      <button className="btn btn-p" onClick={doCompare} style={{marginBottom:18}}>Compare</button>
      {err&&<div className="alert alert-warn">{err}</div>}
      {s1&&s2&&(
        <div>
          <div className="g2" style={{marginBottom:14}}>
            {[s1,s2].map((s,idx)=>(
              <div key={idx} className="card" style={{borderColor:idx===0?'var(--blue)':'var(--border-strong)',cursor:'pointer'}} onClick={()=>onOpen(s)}>
                <div className="card-bd"><div style={{fontSize:14,fontWeight:500,marginBottom:2}}>{s.name}</div><div style={{fontSize:11,color:'var(--text-3)',marginBottom:10}}>{s.city}, {s.country}</div><FunderBar classes={s.funderClasses}/></div>
              </div>
            ))}
          </div>
          <div className="card" style={{marginBottom:14}}>
            <div className="card-hd"><div className="card-title">Metric comparison</div></div>
            <div className="card-bd">
              {metrics.map(m=>{const mx=Math.max(m.v1,m.v2,1);return(
                <div key={m.l} style={{display:'grid',gridTemplateColumns:'1fr 95px 1fr',gap:14,alignItems:'center',padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                  <div><div style={{fontWeight:600,fontVariantNumeric:'tabular-nums',fontSize:14,textAlign:'right',color:m.v1>m.v2?'var(--blue)':m.v1<m.v2?'var(--text-3)':'var(--text)'}}>{m.v1.toLocaleString()}</div><PBar val={m.v1} max={mx} color="var(--blue)"/></div>
                  <div style={{textAlign:'center',fontSize:10.5,color:'var(--text-3)',fontWeight:500}}>{m.l}</div>
                  <div><div style={{fontWeight:600,fontVariantNumeric:'tabular-nums',fontSize:14,color:m.v2>m.v1?'var(--purple)':m.v2<m.v1?'var(--text-3)':'var(--text)'}}>{m.v2.toLocaleString()}</div><PBar val={m.v2} max={mx} color="var(--purple)"/></div>
                </div>

          </div>
          <div className="g2">
            {['sponsors','conditions'].map(f=>{const common=s1[f].filter(x=>s2[f].includes(x));return(<div key={f} className="card"><div className="card-hd"><div className="card-title">Common {f} ({common.length})</div></div><div className="card-bd">{common.length?<div style={{display:'flex',flexWrap:'wrap',gap:3}}>{common.slice(0,12).map(x=><span key={x} className="badge b-neutral">{x}</span>)}</div>:<span style={{fontSize:11,color:'var(--text-3)'}}>None in common</span>}</div></div>);})}

        </div>

function App(){
  const [section,setSection]=useState('dashboard');
  const [updatesWin,setUpdatesWin]=useState('24h');
  const [data,setData]=useState([]);const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(null);const [toast,setToast]=useState(null);
  const [exportScope,setExportScope]=useState({sites:null,label:'all sites'});
  const [apiAlert,setApiAlert]=useState(null);
  const [cacheInfo,setCacheInfo]=useState(()=>{
    try{ return Object.keys(sessionStorage).filter(k=>k.startsWith('tsi__')).length; }
    catch{ return 0; }
  });

  const clearCache=useCallback(()=>{
    try{ Object.keys(sessionStorage).filter(k=>k.startsWith('tsi__')).forEach(k=>sessionStorage.removeItem(k)); }
    catch{}
    setCacheInfo(0);
    setData([]);
    setLoading(true);
    fetchAll({},20).then(studies=>{
      if(!studies.length) setApiAlert({type:'down',color:'#fac775',bg:'var(--amber-bg)',textColor:'var(--amber)',msg:'No data loaded from ClinicalTrials.gov. The API may be down for maintenance. Please refresh after a few minutes.'});
      setData(processSites(studies));
      setLoading(false);
      setCacheInfo(c=>c+1);
    });
  },[]); // {type,msg,color}
  useEffect(()=>{
    const handler=(e)=>{
      const t=e.detail?.type;
      if(t==='rate') setApiAlert({type:'rate',color:'#f5b8b8',bg:'var(--red-bg)',textColor:'var(--red)',msg:'Rate limit reached — ClinicalTrials.gov allows ~10 requests/sec. Retrying automatically. If this persists, wait 30 seconds and refresh.'});
      else if(t==='down') setApiAlert({type:'down',color:'#fac775',bg:'var(--amber-bg)',textColor:'var(--amber)',msg:'ClinicalTrials.gov API is unreachable. This may be scheduled maintenance. Please refresh in a few minutes.'});
      else if(t==='http') setApiAlert({type:'http',color:'#f5b8b8',bg:'var(--red-bg)',textColor:'var(--red)',msg:`ClinicalTrials.gov API returned an error (HTTP ${e.detail?.status||'?'}). Some data may be incomplete. Try refreshing.`});
      // auto-dismiss non-critical after 12s
      if(t==='rate') setTimeout(()=>setApiAlert(a=>a?.type==='rate'?null:a),12000);
    };
    window.addEventListener('api-error',handler);return()=>window.removeEventListener('api-error',handler);
  },[]);
  useEffect(()=>{
    fetchAll({},20).then(studies=>{
      if(!studies.length){
        setApiAlert({type:'down',color:'#fac775',bg:'var(--amber-bg)',textColor:'var(--amber)',msg:'🔌 No data loaded from ClinicalTrials.gov. The API may be down for maintenance. Please refresh after a few minutes.'});
      }
      setData(processSites(studies));setLoading(false);
    });
  },[]);
  const navigateTo=(sec,win)=>{if(win)setUpdatesWin(win);setSection(sec);};
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),3000);};
  const exportCSV=()=>{
    const sites=exportScope.sites||data;if(!sites.length){showToast('No data to export');return;}
    const rows=[['Site Name','City','State','Country','Trials','Recruiting','Completed','Sponsors','Conditions','Funder','Enrollment','Top Conditions']];
    sites.forEach(s=>rows.push([`"${s.name.replace(/"/g,'""')}"`,`"${s.city}"`,`"${s.state}"`,`"${s.country}"`,s.trialCount,s.recruitingCount,s.completedCount,s.sponsors.length,s.conditions.length,(FM[s.dominantFunder]||FM.OTHER).label,s.totalEnrollment,`"${s.conditions.slice(0,5).join('; ')}"`]));
    const blob=new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`trialsite_${exportScope.label.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.csv`;a.click();showToast(`Exported ${sites.length.toLocaleString()} sites`);
  };
  const nav=NAV.find(n=>n.id===section);
  return(
    <div className="shell">
      {apiAlert&&(
        <div style={{position:'fixed',top:52,left:0,right:0,zIndex:2100,borderBottom:`1px solid ${apiAlert.color}`,background:'var(--bg)',display:'flex',alignItems:'center',gap:12,padding:'0 20px',height:36}}>
          <span style={{width:6,height:6,borderRadius:'50%',background:apiAlert.textColor,flexShrink:0,display:'inline-block'}}/>
          <span style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.5px',color:apiAlert.textColor,flexShrink:0}}>
            {apiAlert.type==='rate'?'Rate Limit':apiAlert.type==='down'?'Service Unavailable':'API Error'}
          </span>
          <span style={{fontSize:11,color:'var(--text-2)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{apiAlert.msg}</span>
          <button onClick={()=>setApiAlert(null)} style={{background:'none',border:'none',color:'var(--text-3)',fontSize:14,cursor:'pointer',padding:'0 0 0 8px',lineHeight:1,flexShrink:0,fontWeight:400}}>Dismiss</button>
        </div>
      )}
      <header className="topbar">
        <a className="brand" href="#"><div className="brand-mark"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 3h6l1 9H8zm0 9h6l1 9H8z"/></svg></div><div><div className="brand-name">TrialSite Intelligence</div><div className="brand-version">Clinical Trial Analytics</div></div></a>
        <GlobalSearch data={data} onOpen={setModal}/>
        <div className="tb-right">
          <div className="pill" style={{gap:6}}>
            {loading
              ?<><Spin s={11}/><span style={{marginLeft:4}}>Loading…</span></>
              :<><span className="live-dot"/><span>{data.length.toLocaleString()} sites indexed</span></>
            }
          </div>
          {!loading&&(
            <button className="tb-btn" onClick={clearCache} title="Clear session cache and reload fresh data from ClinicalTrials.gov" style={{fontSize:11,color:'var(--text-3)'}}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
              Refresh data
            </button>
          )}
          <button className="tb-btn" onClick={exportCSV} title={`Export ${(exportScope.sites||data).length} sites`}>Export CSV {exportScope.sites?<span style={{fontSize:10,opacity:.7}}>({exportScope.sites.length})</span>:<span style={{fontSize:10,opacity:.7}}>(all)</span>}</button>
        </div>
      </header>
      <div className="body">
        <nav className="sidebar">
          <div style={{paddingTop:8}}>
            <div className="nav-group">Navigation</div>
            {NAV.map(n=>(<div key={n.id} className={`nav-item${section===n.id?' active':''}`} onClick={()=>setSection(n.id)}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d={n.icon}/></svg>{n.label}</div>))}
          </div>
          <div style={{marginTop:8}}><div className="nav-group">Activity</div><SidebarUpdates onNavigate={navigateTo}/></div>
          {!loading&&(
            <div className="sidebar-foot">
              <div className="nav-group" style={{padding:'0 0 8px'}}>Live data</div>
              <div className="sb-stat"><span>Sites</span><span className="v">{data.length.toLocaleString()}</span></div>
              <div className="sb-stat"><span>Recruiting</span><span className="v">{data.filter(s=>s.recruitingCount>0).length.toLocaleString()}</span></div>
              <div className="sb-stat"><span>Countries</span><span className="v">{new Set(data.map(s=>s.country)).size}</span></div>
              <div className="sb-stat"><span>Records</span><span className="v">{data.reduce((a,s)=>a+s.trialCount,0).toLocaleString()}</span></div>
            </div>
          )}
        </nav>
        <main className="content">
          <div className="ph"><div className="ph-title">{nav?.label}</div><div className="ph-meta">ClinicalTrials.gov API v2 · {new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div></div>
          {section==='updates'   &&<RecentUpdates initialWin={updatesWin}/>}
          {section==='dashboard' &&<Dashboard data={data} onOpen={setModal} setSection={setSection} onFilterChange={(sites,label)=>setExportScope(sites?{sites,label}:{sites:null,label:'all sites'})}/>}
          {section==='topSites'  &&<TopSites  data={data} onOpen={setModal} onFilterChange={(sites,label)=>setExportScope({sites,label})}/>}
          {section==='drug'      &&<SearchSection type="drug"    onOpen={setModal} onFilterChange={(sites,label)=>setExportScope({sites,label})}/>}
          {section==='disease'   &&<SearchSection type="disease" onOpen={setModal} onFilterChange={(sites,label)=>setExportScope({sites,label})}/>}
          {section==='phase'     &&<PhaseSection  data={data} onOpen={setModal} onFilterChange={(sites,label)=>setExportScope({sites,label})}/>}
          {section==='funder'    &&<FunderSection data={data} onOpen={setModal} onFilterChange={(sites,label)=>setExportScope({sites,label})}/>}
          {section==='map'       &&<MapSection    data={data} onOpen={setModal}/>}
          {section==='compare'   &&<Compare       data={data} onOpen={setModal}/>}
          {section==='guide'     &&<Guide/>}
        </main>
      </div>
      <footer style={{borderTop:'1px solid var(--border)',background:'var(--bg)',padding:'12px 28px',display:'flex',alignItems:'center',gap:16,flexShrink:0}}>
        <span style={{fontSize:11,color:'var(--text-3)'}}>Created and maintained by</span>
        <span style={{fontSize:11,fontWeight:500,color:'var(--text-2)'}}>Nirmit Sachde</span>
        <span style={{width:1,height:12,background:'var(--border)'}}/>
        <a href="https://www.linkedin.com/in/nirmit-a-sachde/" target="_blank" style={{fontSize:11,color:'var(--blue)',display:'flex',alignItems:'center',gap:4}}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
          LinkedIn
        </a>
        <span style={{width:1,height:12,background:'var(--border)'}}/>
        <a href="mailto:sachde.n@northeastern.edu" style={{fontSize:11,color:'var(--blue)'}}>sachde.n@northeastern.edu</a>
        <span style={{marginLeft:'auto',fontSize:10,color:'var(--text-3)'}}>Data sourced from ClinicalTrials.gov API v2</span>
      </footer>
      {modal&&<SiteModal site={modal} onClose={()=>setModal(null)}/>}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
