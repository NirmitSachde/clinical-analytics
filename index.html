<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TrialSite Intelligence</title>
<link rel="icon" href="https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/dna.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg:#ffffff;--bg-subtle:#f8f8f7;--bg-muted:#f1f0ee;--bg-raised:#ffffff;
  --border:#e2e2de;--border-strong:#c8c8c4;
  --text:#181816;--text-2:#52524e;--text-3:#888884;
  --blue:#1a5276;--blue-bg:#eaf0f6;--blue-mid:#2471a3;
  --green:#1a6b3a;--green-bg:#eaf5ee;
  --amber:#7d4e00;--amber-bg:#fef9ec;
  --red:#8b1f1f;--red-bg:#fdf0f0;
  --purple:#4a2885;--purple-bg:#f3effe;
  --teal:#0e6e6e;--teal-bg:#e8f6f6;
  --r:6px;--r-lg:10px;
  --font:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;
  --mono:"SF Mono","Fira Code",monospace;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.09);
  --shadow-lg:0 12px 40px rgba(0,0,0,.14);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#161614;--bg-subtle:#1e1e1c;--bg-muted:#262624;--bg-raised:#1e1e1c;
  --border:#303030;--border-strong:#484848;
  --text:#f0efe8;--text-2:#a0a09a;--text-3:#606060;
  --blue:#7bafd4;--blue-bg:#12202c;--blue-mid:#5090b8;
  --green:#70c090;--green-bg:#0e2018;
  --amber:#d4954a;--amber-bg:#201808;
  --red:#e87878;--red-bg:#200e0e;
  --purple:#a888e8;--purple-bg:#1a1028;
  --teal:#48b8b8;--teal-bg:#081818;
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg-subtle);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
button,input,select,textarea{font-family:var(--font)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}

/* ── LAYOUT ─────────────────────────────────────── */
.shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{height:52px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:300;flex-shrink:0}
.body{display:flex;flex:1}
.sidebar{width:196px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;flex-shrink:0}
.content{flex:1;min-width:0;padding:24px 28px;overflow-x:hidden}

/* ── TOPBAR ─────────────────────────────────────── */
.brand{display:flex;align-items:center;gap:9px;flex-shrink:0;text-decoration:none}
.brand-mark{width:28px;height:28px;background:var(--blue);border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-name{font-size:13px;font-weight:600;letter-spacing:-.2px;color:var(--text)}
.brand-version{font-size:10px;color:var(--text-3);font-weight:400}
.tb-search{flex:1;max-width:400px;position:relative}
.tb-search input{width:100%;height:32px;padding:0 30px 0 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg-subtle);font-size:13px;color:var(--text);outline:none;transition:border-color .15s}
.tb-search input:focus{border-color:var(--blue);background:var(--bg)}
.tb-search input::placeholder{color:var(--text-3)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-2)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tb-btn{height:30px;padding:0 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);font-size:12px;color:var(--text-2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.tb-btn:hover{border-color:var(--border-strong);color:var(--text)}

/* ── SIDEBAR ────────────────────────────────────── */
.nav-group{padding:12px 10px 3px;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--text-3)}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:12.5px;color:var(--text-2);cursor:pointer;border-left:2px solid transparent;transition:all .1s;user-select:none;border-radius:0}
.nav-item:hover{color:var(--text);background:var(--bg-subtle)}
.nav-item.active{color:var(--blue);background:var(--blue-bg);border-left-color:var(--blue);font-weight:500}
.nav-item svg{width:13px;height:13px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.sidebar-foot{margin:auto 0 0;padding:12px 14px 14px;border-top:1px solid var(--border)}
.sb-stat{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;color:var(--text-2)}
.sb-stat .v{font-weight:500;color:var(--text);font-variant-numeric:tabular-nums}

/* ── PAGE ───────────────────────────────────────── */
.ph{margin-bottom:20px}
.ph-title{font-size:19px;font-weight:600;letter-spacing:-.3px;color:var(--text);line-height:1.2}
.ph-meta{font-size:11px;color:var(--text-3);margin-top:3px}

/* ── CARD ───────────────────────────────────────── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow)}
.card-hd{padding:12px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-size:12px;font-weight:500;color:var(--text)}
.card-sub{font-size:11px;color:var(--text-3);margin-top:1px}
.card-bd{padding:15px}

/* ── KPI STRIP ──────────────────────────────────── */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow)}
.kpi{background:var(--bg);padding:14px 16px;position:relative}
.kpi-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin-bottom:5px}
.kpi-val{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.4px;font-variant-numeric:tabular-nums;line-height:1}
.kpi-sub{font-size:10px;color:var(--text-3);margin-top:3px}
.kpi-trend{position:absolute;top:12px;right:12px;font-size:10px;font-weight:500;padding:2px 6px;border-radius:3px}
.kpi-trend.up{background:var(--green-bg);color:var(--green)}
.kpi-trend.down{background:var(--red-bg);color:var(--red)}

/* ── GRID ───────────────────────────────────────── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:12px}
@media(max-width:1000px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* ── FORM ───────────────────────────────────────── */
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px}
.inp{height:33px;padding:0 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);font-size:12.5px;color:var(--text);outline:none;transition:border-color .15s;width:100%}
.inp:focus{border-color:var(--blue)}
.inp::placeholder{color:var(--text-3)}
.sel{height:33px;padding:0 7px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);font-size:12.5px;color:var(--text);outline:none;width:100%;cursor:pointer}
.sel:focus{border-color:var(--blue)}
.form-row{display:flex;gap:9px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}
.form-row .field{flex:1;min-width:150px}

/* ── BUTTON ─────────────────────────────────────── */
.btn{height:33px;padding:0 13px;border-radius:var(--r);font-size:12.5px;font-weight:500;border:1px solid var(--border);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-p:hover{background:var(--blue-mid)}
.btn-p:disabled{opacity:.4;cursor:not-allowed}
.btn-d{background:var(--bg);color:var(--text-2)}
.btn-d:hover{border-color:var(--border-strong);color:var(--text)}
.btn-sm{height:26px;padding:0 9px;font-size:11px}

/* ── BADGE ──────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;height:18px;padding:0 6px;border-radius:3px;font-size:10.5px;font-weight:500;white-space:nowrap}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-green{background:var(--green-bg);color:var(--green)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-neutral{background:var(--bg-muted);color:var(--text-2)}
.b-purple{background:var(--purple-bg);color:var(--purple)}
.b-teal{background:var(--teal-bg);color:var(--teal)}
.b-industry{background:#ede8fc;color:#3a2880}
.b-nih{background:#e1f5ee;color:#0a5c42}
.b-federal{background:#faeeda;color:#5c3a0a}
.b-other{background:var(--bg-muted);color:var(--text-2)}
@media(prefers-color-scheme:dark){
  .b-industry{background:#2a2060;color:#b0a0f0}
  .b-nih{background:#0a2a1e;color:#60c09a}
  .b-federal{background:#2a1e0a;color:#d4954a}
}

/* ── SEG ─────────────────────────────────────────── */
.segs{display:flex;gap:2px;flex-wrap:wrap}
.seg{height:28px;padding:0 11px;border:1px solid var(--border);background:var(--bg);font-size:11.5px;color:var(--text-2);border-radius:var(--r);transition:all .12s;cursor:pointer}
.seg:hover{color:var(--text);border-color:var(--border-strong)}
.seg.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:500}

/* ── TABLE ──────────────────────────────────────── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{border-bottom:1px solid var(--border)}
th{padding:9px 11px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);white-space:nowrap}
td{padding:8px 11px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg-subtle)}
.mono{font-family:var(--mono);font-size:11px;color:var(--blue)}

/* ── PROGRESS ───────────────────────────────────── */
.pt{height:100%;background:var(--bg-muted);border-radius:inherit;overflow:hidden}
.pf{height:100%;border-radius:inherit;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* ── TOOLTIP ─────────────────────────────────────── */
.tt{position:fixed;pointer-events:none;z-index:800;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;box-shadow:var(--shadow-md);min-width:150px;max-width:220px}
.tt-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:5px;word-break:break-word}
.tt-row{display:flex;justify-content:space-between;gap:14px;font-size:11px;color:var(--text-2);margin-top:2px}
.tt-row span:last-child{font-weight:500;color:var(--text);font-variant-numeric:tabular-nums}

/* ── AUTOCOMPLETE ───────────────────────────────── */
.acp{position:relative}
.acd{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-md);z-index:500;overflow:hidden;max-height:260px;overflow-y:auto}
.ach{padding:5px 11px;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);border-bottom:1px solid var(--border);background:var(--bg-subtle)}
.aci{padding:7px 11px;cursor:pointer;font-size:12.5px;color:var(--text);border-bottom:1px solid var(--border);transition:background .1s}
.aci:last-child{border-bottom:none}
.aci:hover,.aci.hl{background:var(--blue-bg);color:var(--blue)}
.aci-sub{font-size:10.5px;color:var(--text-3);margin-top:1px}
.acf{padding:4px 11px;font-size:10px;color:var(--text-3);background:var(--bg-subtle);border-top:1px solid var(--border)}

/* ── MODAL ──────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);width:100%;max-width:780px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-hd{padding:16px 18px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-x{width:26px;height:26px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);font-size:15px;color:var(--text-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;padding:0;transition:all .12s}
.modal-x:hover{color:var(--text);border-color:var(--border-strong)}
.modal-bd{padding:18px}
.ms{margin-bottom:20px}
.ms-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border)}

/* ── ALERT ──────────────────────────────────────── */
.alert{display:flex;gap:8px;padding:9px 12px;border-radius:var(--r);font-size:12.5px;margin-bottom:14px;border:1px solid}
.alert-info{background:var(--blue-bg);color:var(--blue);border-color:#b5d4f4}
.alert-ok{background:var(--green-bg);color:var(--green);border-color:#c0dd97}
.alert-warn{background:var(--amber-bg);color:var(--amber);border-color:#fac775}

/* ── FUNDER BAR ─────────────────────────────────── */
.fb{display:flex;height:7px;border-radius:4px;overflow:hidden;margin-bottom:7px;background:var(--bg-muted)}
.fb-seg{transition:width .4s}
.fb-legend{display:flex;flex-wrap:wrap;gap:4px 12px}
.fb-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-2)}
.fb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── SITE CARD ──────────────────────────────────── */
.sc{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px 14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;box-shadow:var(--shadow)}
.sc:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md)}
.sc-rank{position:absolute;top:11px;right:13px;font-size:11px;font-weight:600;color:var(--text-3);font-variant-numeric:tabular-nums}
.sc-name{font-size:12.5px;font-weight:500;color:var(--text);margin-bottom:2px;padding-right:26px;line-height:1.3}
.sc-loc{font-size:11px;color:var(--text-3);margin-bottom:8px}
.sc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.sc-cond{font-size:10.5px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:7px}
.sc-link{font-size:11px;color:var(--blue)}

/* ── RANK LIST ──────────────────────────────────── */
.rl-item{display:flex;align-items:center;gap:10px;padding:8px 5px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:var(--r);transition:background .1s}
.rl-item:last-child{border-bottom:none}
.rl-item:hover{background:var(--bg-subtle)}
.rl-num{width:20px;text-align:center;font-size:11px;font-weight:600;color:var(--text-3);flex-shrink:0;font-variant-numeric:tabular-nums}
.rl-info{flex:1;min-width:0}
.rl-name{font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rl-meta{font-size:11px;color:var(--text-3);margin-top:1px}

/* ── STATUS ─────────────────────────────────────── */
.st-rec{background:var(--green-bg);color:var(--green)}
.st-com{background:var(--blue-bg);color:var(--blue)}
.st-act{background:var(--amber-bg);color:var(--amber)}
.st-def{background:var(--bg-muted);color:var(--text-2)}

/* ── MAP ─────────────────────────────────────────── */
#trial-map{height:420px;border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden}
.leaflet-popup-content-wrapper{border-radius:var(--r)!important;box-shadow:var(--shadow-md)!important;border:1px solid var(--border)!important;font-family:var(--font)!important}
.leaflet-popup-tip{display:none}
.map-legend{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;line-height:1.6;box-shadow:var(--shadow)}
.map-legend-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-bottom:6px}
.map-legend-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-2)}
.map-legend-swatch{width:14px;height:10px;border-radius:2px;flex-shrink:0}

/* ── SVG CHARTS ─────────────────────────────────── */
.bar-r{cursor:pointer;transition:opacity .12s}
.bar-r:hover{opacity:.72}
.line-dot{cursor:pointer;transition:r .1s,fill .1s}

/* ── EXT LINKS ──────────────────────────────────── */
.ext-links{display:flex;flex-wrap:wrap;gap:6px}
.ext-link{display:inline-flex;align-items:center;gap:5px;height:28px;padding:0 9px;border:1px solid var(--border);border-radius:var(--r);font-size:11.5px;color:var(--text-2);transition:all .12s}
.ext-link:hover{border-color:var(--border-strong);color:var(--text);text-decoration:none}

/* ── MISC ───────────────────────────────────────── */
.spin{display:inline-block;border-radius:50%;border:2px solid var(--border);border-top-color:var(--blue);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:var(--border);margin:14px 0}
.toast{position:fixed;bottom:18px;right:18px;background:var(--text);color:var(--bg);padding:9px 14px;border-radius:var(--r);font-size:12.5px;z-index:2000;box-shadow:var(--shadow-md);pointer-events:none}
.section{animation:fu .16s ease both}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.chip{height:26px;padding:0 9px;border:1px solid var(--border);border-radius:12px;font-size:11.5px;color:var(--text-2);background:var(--bg);transition:all .12s;cursor:pointer}
.chip:hover{border-color:var(--border-strong);color:var(--text)}
.h-bar-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-radius:var(--r)}
.h-bar-row:hover{background:var(--bg-subtle)}
.h-bar-label{font-size:11px;color:var(--text-2);width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.h-bar-track{flex:1;height:5px;background:var(--bg-muted);border-radius:3px;overflow:hidden}
.h-bar-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.h-bar-val{font-size:11px;font-weight:500;color:var(--text);min-width:34px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback} = React;

/* ── CONSTANTS ─────────────────────────────────────── */
const BASE='https://clinicaltrials.gov/api/v2';
const FM={
  INDUSTRY:{label:'Industry', cls:'b-industry', color:'#7c60d8'},
  NIH:     {label:'NIH',      cls:'b-nih',      color:'#1d9e75'},
  FED:     {label:'Federal',  cls:'b-federal',  color:'#ba7517'},
  OTHER:   {label:'Academic', cls:'b-other',    color:'#888880'},
};
const SM={
  RECRUITING:{cls:'st-rec',label:'Recruiting'},
  COMPLETED: {cls:'st-com',label:'Completed'},
  ACTIVE_NOT_RECRUITING:{cls:'st-act',label:'Active, Not Recruiting'},
};

/* ── API ────────────────────────────────────────────── */
async function fetchAll(params={},maxPages=15){
  let all=[],token=null,p=0;
  while(p<maxPages){
    const q={format:'json',pageSize:100,...params};
    if(token)q.pageToken=token;
    try{const r=await fetch(`${BASE}/studies?${new URLSearchParams(q)}`);if(!r.ok)break;const d=await r.json();all=all.concat(d.studies||[]);if(d.nextPageToken){token=d.nextPageToken;p++;}else break;}catch{break;}
  }
  return all;
}

/* ── PROCESS ────────────────────────────────────────── */
function processSites(studies){
  const map={};
  studies.forEach(s=>{
    const pr=s.protocolSection||{},id=pr.identificationModule||{},st=pr.statusModule||{},sp=pr.sponsorCollaboratorsModule||{},co=pr.conditionsModule||{},de=pr.designModule||{},ar=pr.armsInterventionsModule||{},lo=pr.contactsLocationsModule||{};
    const fc=sp.leadSponsor?.class||'OTHER',sn=sp.leadSponsor?.name||'',cl=(sp.collaborators||[]).map(c=>c.name).filter(Boolean);
    (lo.locations||[]).forEach(loc=>{
      const name=loc.facility||'Unknown',city=loc.city||'Unknown',state=loc.state||'',country=loc.country||'Unknown',k=`${name}|||${city}|||${country}`;
      if(!map[k])map[k]={key:k,name,city,state,country,lat:loc.geoPoint?.lat,lng:loc.geoPoint?.lon,trials:[],sponsors:new Set(),collaborators:new Set(),conditions:new Set(),phases:new Set(),funderClasses:{},statuses:{},totalEnrollment:0,recruitingCount:0,completedCount:0};
      const e=map[k];
      e.trials.push({nctId:id.nctId,title:id.briefTitle||'',status:st.overallStatus||'UNKNOWN',sponsor:sn,funderClass:fc,phases:de.phases||[],enrollment:parseInt(de.enrollmentInfo?.count||0)||0,startDate:st.startDateStruct?.date||''});
      e.sponsors.add(sn);cl.forEach(c=>e.collaborators.add(c));
      (co.conditions||[]).forEach(c=>e.conditions.add(c));(de.phases||[]).forEach(p=>e.phases.add(p));
      e.funderClasses[fc]=(e.funderClasses[fc]||0)+1;
      const status=st.overallStatus||'UNKNOWN';e.statuses[status]=(e.statuses[status]||0)+1;
      if(status==='RECRUITING')e.recruitingCount++;if(status==='COMPLETED')e.completedCount++;
      e.totalEnrollment+=parseInt(de.enrollmentInfo?.count||0)||0;
    });
  });
  return Object.values(map).map(s=>({...s,sponsors:[...s.sponsors].filter(Boolean),collaborators:[...s.collaborators].filter(Boolean),conditions:[...s.conditions],phases:[...s.phases],trialCount:s.trials.length,dominantFunder:Object.entries(s.funderClasses).sort((a,b)=>b[1]-a[1])[0]?.[0]||'OTHER'})).sort((a,b)=>b.trialCount-a.trialCount);
}

/* ── TOOLTIP HOOK ───────────────────────────────────── */
function useTT(){
  const [tt,setTT]=useState({v:false,x:0,y:0,title:'',rows:[]});
  const show=(e,title,rows)=>setTT({v:true,x:e.clientX,y:e.clientY,title,rows});
  const move=(e)=>setTT(p=>p.v?{...p,x:e.clientX,y:e.clientY}:p);
  const hide=()=>setTT(p=>({...p,v:false}));
  return{tt,show,move,hide};
}
const TT=({v,x,y,title,rows})=>{
  if(!v)return null;
  const style={left:x+14,top:y-10};
  if(x+240>window.innerWidth)style.left=x-190;
  if(y+80>window.innerHeight)style.top=y-70;
  return<div className="tt" style={style}>{title&&<div className="tt-title">{title}</div>}{rows.map((r,i)=><div key={i} className="tt-row"><span>{r.l}</span><span>{r.v}</span></div>)}</div>;
};

/* ── BAR CHART ──────────────────────────────────────── */
const BarChart=({data,h=130,onCk,activeKey,colorFn})=>{
  const {tt,show,move,hide}=useTT();
  if(!data.length)return null;
  const max=Math.max(...data.map(d=>d.value),1);
  const bw=Math.floor(100/data.length);
  const gap=Math.max(1,Math.floor(bw*.14));
  const bw2=bw-gap*2;
  return(
    <div style={{position:'relative'}} onMouseMove={move}>
      <TT {...tt}/>
      <svg viewBox={`0 0 100 ${h}`} style={{width:'100%',height:h,display:'block',overflow:'visible'}}>
        {data.map((d,i)=>{
          const bh=Math.max(2,(d.value/max)*(h-18));
          const x=i*bw+gap,y=h-18-bh;
          const col=colorFn?colorFn(d):d.color||'var(--blue)';
          const act=activeKey===d.key;
          return(
            <rect key={d.key||i} className="bar-r" x={x} y={y} width={bw2} height={bh} rx={2}
              fill={col} opacity={activeKey&&!act?.4:1}
              stroke={act?'var(--text)':'none'} strokeWidth={act?.6:0}
              onMouseEnter={e=>show(e,d.label,[{l:'Count',v:d.value.toLocaleString()},...(d.rows||[])])}
              onMouseLeave={hide} onClick={()=>onCk&&onCk(d)}
              style={{cursor:onCk?'pointer':'default'}}/>
          );
        })}
        {data.map((d,i)=>(
          <text key={d.key+'l'} x={i*bw+bw/2} y={h-4} textAnchor="middle" fontSize={6.5} fill="var(--text-3)" style={{pointerEvents:'none'}}>
            {(d.shortLabel||d.label||'').slice(0,7)}
          </text>
        ))}
      </svg>
    </div>
  );
};

/* ── LINE CHART ─────────────────────────────────────── */
const LineChart=({data,h=120,color='var(--blue)',onCk})=>{
  const {tt,show,move,hide}=useTT();
  const [hl,setHl]=useState(null);
  if(!data.length)return null;
  const maxV=Math.max(...data.map(d=>d.value),1);
  const minV=Math.min(...data.map(d=>d.value),0);
  const range=maxV-minV||1;
  const W=200,pT=10,pB=16,pL=4,pR=4;
  const cx=i=>pL+(i/(data.length-1||1))*(W-pL-pR);
  const cy=v=>pT+(1-(v-minV)/range)*(h-pT-pB);
  const pts=data.map((d,i)=>({...d,cx:cx(i),cy:cy(d.value)}));
  const pD=pts.map((p,i)=>i===0?`M${p.cx.toFixed(2)},${p.cy.toFixed(2)}`:`L${p.cx.toFixed(2)},${p.cy.toFixed(2)}`).join(' ');
  const aD=`${pD} L${pts[pts.length-1].cx.toFixed(2)},${h-pB} L${pts[0].cx.toFixed(2)},${h-pB} Z`;
  return(
    <div style={{position:'relative'}} onMouseMove={move}>
      <TT {...tt}/>
      <svg viewBox={`0 0 ${W} ${h}`} style={{width:'100%',height:h,display:'block',overflow:'visible'}}>
        <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".15"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
        <path d={aD} fill="url(#lg)"/>
        <path d={pD} fill="none" stroke={color} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=>(
          <circle key={i} className="line-dot" cx={p.cx} cy={p.cy} r={hl===i?4:2.2}
            fill={hl===i?color:'var(--bg)'} stroke={color} strokeWidth="1.4"
            style={{cursor:onCk?'pointer':'default'}}
            onMouseEnter={e=>{setHl(i);show(e,p.label,[{l:'Trials started',v:p.value.toLocaleString()}]);}}
            onMouseLeave={()=>{setHl(null);hide();}}
            onClick={()=>onCk&&onCk(p)}/>
        ))}
        {pts.map((p,i)=>(i===0||i===pts.length-1||i===Math.floor(pts.length/2))&&(
          <text key={i+'l'} x={p.cx} y={h-2} textAnchor="middle" fontSize={6.5} fill="var(--text-3)" style={{pointerEvents:'none'}}>{p.shortLabel||p.label}</text>
        ))}
      </svg>
    </div>
  );
};

/* ── DONUT CHART ────────────────────────────────────── */
const Donut=({data,size=110,onCk,activeKey})=>{
  const {tt,show,move,hide}=useTT();
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  const cx=size/2,cy=size/2,r=size*.38,ir=size*.22;
  let angle=-Math.PI/2;
  const slices=data.map(d=>{
    const sw=(d.value/total)*Math.PI*2;
    const a1=angle,a2=angle+sw;angle=a2;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const ix1=cx+ir*Math.cos(a1),iy1=cy+ir*Math.sin(a1);
    const ix2=cx+ir*Math.cos(a2),iy2=cy+ir*Math.sin(a2);
    const large=sw>Math.PI?1:0;
    const path=`M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} L${ix2},${iy2} A${ir},${ir} 0 ${large} 0 ${ix1},${iy1} Z`;
    return{...d,path,midA:(a1+a2)/2,pct:(d.value/total*100)};
  });
  const active=slices.find(s=>s.key===activeKey);
  return(
    <div style={{position:'relative',display:'inline-block',flexShrink:0}} onMouseMove={move}>
      <TT {...tt}/>
      <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size,display:'block',overflow:'visible'}}>
        {slices.map((s,i)=>{
          const act=activeKey===s.key;
          const off=act?3.5:0;
          return(
            <g key={s.key||i} transform={`translate(${off*Math.cos(s.midA)-cx+cx},${off*Math.sin(s.midA)-cy+cy})`}>
              <path d={s.path} fill={s.color} opacity={activeKey&&!act?.45:1}
                stroke={act?'var(--bg)':'var(--bg)'} strokeWidth={act?2:1}
                onMouseEnter={e=>show(e,s.label,[{l:'Trials',v:s.value.toLocaleString()},{l:'Share',v:s.pct.toFixed(1)+'%'}])}
                onMouseLeave={hide} onClick={()=>onCk&&onCk(s)}
                style={{cursor:onCk?'pointer':'default',transition:'opacity .12s'}}/>
            </g>
          );
        })}
        {active&&<>
          <text x={cx} y={cy-4} textAnchor="middle" fontSize={9} fontWeight="500" fill="var(--text)" style={{pointerEvents:'none'}}>{active.pct.toFixed(0)}%</text>
          <text x={cx} y={cy+7} textAnchor="middle" fontSize={6.5} fill="var(--text-3)" style={{pointerEvents:'none'}}>{active.label.slice(0,11)}</text>
        </>}
      </svg>
    </div>
  );
};

/* ── AUTOCOMPLETE INPUT ─────────────────────────────── */
const AutoInput=({value,onChange,onSelect,onEnter,placeholder,suggestions,loading,label})=>{
  const [open,setOpen]=useState(false);const [hl,setHl]=useState(-1);const ref=useRef(null);
  const filtered=useMemo(()=>{if(value.length<3)return[];const q=value.toLowerCase();return suggestions.filter(s=>s.toLowerCase().includes(q)).slice(0,9);},[value,suggestions]);
  useEffect(()=>{setOpen(filtered.length>0);setHl(-1);},[filtered.length]);
  useEffect(()=>{const fn=e=>{if(!ref.current?.contains(e.target))setOpen(false);};document.addEventListener('mousedown',fn);return()=>document.removeEventListener('mousedown',fn);},[]);
  const pick=s=>{onSelect(s);setOpen(false);setHl(-1);};
  const onKey=e=>{
    if(e.key==='ArrowDown'){e.preventDefault();setHl(h=>Math.min(h+1,filtered.length-1));}
    else if(e.key==='ArrowUp'){e.preventDefault();setHl(h=>Math.max(h-1,-1));}
    else if(e.key==='Enter'){if(hl>=0&&filtered[hl])pick(filtered[hl]);else if(onEnter)onEnter();}
    else if(e.key==='Escape')setOpen(false);
  };
  return(
    <div ref={ref} className="acp field" style={{flex:1}}>
      {label&&<label>{label}</label>}
      <div style={{position:'relative'}}>
        <input className="inp" value={value} onChange={e=>onChange(e.target.value)} onKeyDown={onKey} onFocus={()=>{if(filtered.length)setOpen(true);}} placeholder={placeholder} style={{paddingRight:value?28:9}}/>
        {loading&&<span style={{position:'absolute',right:7,top:'50%',transform:'translateY(-50%)'}}><Spin s={13}/></span>}
        {!loading&&value&&<button onMouseDown={e=>{e.preventDefault();onChange('');setOpen(false);}} style={{position:'absolute',right:0,top:0,height:'100%',width:28,background:'none',border:'none',color:'var(--text-3)',fontSize:15,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>}
      </div>
      {open&&filtered.length>0&&(
        <div className="acd">
          <div className="ach">{filtered.length} suggestion{filtered.length!==1?'s':''}</div>
          {filtered.map((s,i)=><div key={s} className={`aci${i===hl?' hl':''}`} onMouseDown={e=>{e.preventDefault();pick(s);}}>{s}</div>)}
          <div className="acf">↑ ↓ navigate · Enter select</div>
        </div>
      )}
    </div>
  );
};

  useEffect(()=>{const fn=e=>{if(e.key==='Escape')onClose();};document.addEventListener('keydown',fn);return()=>document.removeEventListener('keydown',fn);},[]);
  const pct=site.trialCount>0?Math.round(site.recruitingCount/site.trialCount*100):0;
  const sdData=Object.entries(site.statuses).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({key:k,label:k.replace(/_/g,' '),value:v,color:SC_COLORS[k]||'#888'}));
  const [asd,setAsd]=useState(null);
  const EI=()=><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>;
  return(
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-hd">
          <div>
            <div style={{fontSize:15,fontWeight:600,letterSpacing:'-.2px',lineHeight:1.3}}>{site.name}</div>
            <div style={{fontSize:11,color:'var(--text-3)',marginTop:2}}>{site.city}{site.state?', '+site.state:''}, {site.country}</div>
          </div>
          <button className="modal-x" onClick={onClose}>×</button>
        </div>
        <div className="modal-bd">
          <div className="kpi-strip" style={{marginBottom:16}}>
            {[{l:'Total Trials',v:site.trialCount.toLocaleString()},{l:'Recruiting',v:site.recruitingCount.toLocaleString()},{l:'Completed',v:site.completedCount.toLocaleString()},{l:'Enrollment Target',v:site.totalEnrollment.toLocaleString()}].map(m=><div key={m.l} className="kpi"><div className="kpi-label">{m.l}</div><div className="kpi-val">{m.v}</div></div>)}
          </div>
          <div style={{marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text-3)',marginBottom:3}}><span>Recruiting rate</span><span>{pct}%</span></div>
            <PBar val={site.recruitingCount} max={site.trialCount} h={5}/>
          </div>
          <div className="ms"><div className="ms-title">Funding & Sponsorship</div>
            <FunderBar classes={site.funderClasses}/>
            <div style={{marginTop:12}}>
              <div style={{fontSize:11,fontWeight:500,color:'var(--text-2)',marginBottom:5}}>Lead sponsors</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:3}}>{site.sponsors.slice(0,10).map(s=><span key={s} className="badge b-blue">{s}</span>)}{site.sponsors.length>10&&<span className="badge b-neutral">+{site.sponsors.length-10}</span>}</div>
            </div>
            {site.collaborators.length>0&&<div style={{marginTop:9}}><div style={{fontSize:11,fontWeight:500,color:'var(--text-2)',marginBottom:5}}>Collaborators</div><div style={{display:'flex',flexWrap:'wrap',gap:3}}>{site.collaborators.slice(0,8).map(c=><span key={c} className="badge b-neutral">{c}</span>)}{site.collaborators.length>8&&<span className="badge b-neutral">+{site.collaborators.length-8}</span>}</div></div>}
          </div>
          <div className="ms"><div className="ms-title">Trial Status Breakdown</div>
            <div style={{display:'flex',gap:20,alignItems:'flex-start'}}>
              <Donut data={sdData} size={110} activeKey={asd} onCk={s=>setAsd(asd===s.key?null:s.key)}/>
              <div style={{flex:1}}>
                {sdData.map(d=>(
                  <div key={d.key} onClick={()=>setAsd(asd===d.key?null:d.key)} style={{display:'flex',alignItems:'center',gap:7,padding:'3px 4px',borderRadius:4,cursor:'pointer',opacity:asd&&asd!==d.key?.45:1,background:asd===d.key?'var(--bg-subtle)':'transparent'}}>
                    <span style={{width:6,height:6,borderRadius:'50%',background:d.color,flexShrink:0}}/>
                    <span style={{flex:1,fontSize:11,color:'var(--text-2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.label}</span>
                    <span style={{fontSize:11,fontWeight:500,color:'var(--text)',fontVariantNumeric:'tabular-nums'}}>{d.value.toLocaleString()}</span>
                    <span style={{fontSize:10,color:'var(--text-3)',width:30,textAlign:'right'}}>{(d.value/site.trialCount*100).toFixed(0)}%</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div className="ms"><div className="ms-title">Research Focus</div>
            <div className="g2" style={{gap:14}}>
              <div><div style={{fontSize:11,fontWeight:500,color:'var(--text-2)',marginBottom:5}}>Conditions ({site.conditions.length})</div><div style={{display:'flex',flexWrap:'wrap',gap:3}}>{site.conditions.slice(0,14).map(c=><span key={c} className="badge b-neutral">{c}</span>)}{site.conditions.length>14&&<span className="badge b-neutral">+{site.conditions.length-14}</span>}</div></div>
              <div><div style={{fontSize:11,fontWeight:500,color:'var(--text-2)',marginBottom:5}}>Active phases</div><div style={{display:'flex',flexWrap:'wrap',gap:3}}>{site.phases.map(p=><span key={p} className="badge b-neutral">{p.replace(/_/g,' ')}</span>)}</div></div>
            </div>
          </div>
          <div className="ms"><div className="ms-title">Recent Trials</div>
            <div className="tw"><table>
              <thead><tr><th>NCT ID</th><th>Title</th><th>Status</th><th>Funder</th><th>Start</th></tr></thead>
              <tbody>{site.trials.slice(0,10).map(t=>(
                <tr key={t.nctId}>
                  <td><a href={`https://clinicaltrials.gov/study/${t.nctId}`} target="_blank" className="mono">{t.nctId}</a></td>
                  <td style={{maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={t.title}>{t.title}</td>
                  <td><SB status={t.status}/></td>
                  <td><FB fc={t.funderClass}/></td>
                  <td style={{color:'var(--text-3)',fontVariantNumeric:'tabular-nums',fontSize:11}}>{t.startDate?t.startDate.slice(0,7):'—'}</td>
                </tr>
              ))}</tbody>
            </table></div>
          </div>
          <div className="ms" style={{marginBottom:0}}><div className="ms-title">External Links</div>
            <div className="ext-links">
              {[['https://clinicaltrials.gov/search?locStr='+encodeURIComponent(site.name),'ClinicalTrials.gov'],['https://www.google.com/search?q='+encodeURIComponent(site.name+' '+site.city),'Google Search'],['https://www.google.com/maps/search/'+encodeURIComponent(site.name+' '+site.city),'Google Maps'],['https://scholar.google.com/scholar?q='+encodeURIComponent(site.name),'Google Scholar'],['https://pubmed.ncbi.nlm.nih.gov/?term='+encodeURIComponent(site.name),'PubMed'],['https://www.linkedin.com/search/results/all/?keywords='+encodeURIComponent(site.name),'LinkedIn']].map(([href,label])=>(
                <a key={href} href={href} target="_blank" className="ext-link"><EI/>{label}</a>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════════
   DASHBOARD — fully cross-linked charts
   One shared filter state drives every chart + KPIs + list.
   Clicking any chart slice/bar/row toggles that dimension.
   All other charts re-derive from the filtered pool.
══════════════════════════════════════════════════════════ */
const Dashboard=({data,onOpen,setSection,onFilterChange})=>{
  const [filters,setFilters]=useState({status:null,phase:null,funder:null,country:null});

  const toggle=(dim,key)=>setFilters(f=>({...f,[dim]:f[dim]===key?null:key}));
  const clearAll=()=>setFilters({status:null,phase:null,funder:null,country:null});
  const anyFilter=Object.values(filters).some(Boolean);

  /* filtered pool — reacts to all four dimensions */
  const filtered=useMemo(()=>{
    if(!data.length)return[];
    let r=data;
    if(filters.status) r=r.filter(s=>s.statuses[filters.status]>0);
    if(filters.phase)  r=r.filter(s=>s.phases.includes(filters.phase));
    if(filters.funder) r=r.filter(s=>s.dominantFunder===filters.funder||(s.funderClasses[filters.funder]||0)>0);
    if(filters.country)r=r.filter(s=>s.country===filters.country);
    return r;
  },[data,filters]);

  /* all chart data re-derives from the filtered pool */
  const derived=useMemo(()=>{
    const pool=filtered.length?filtered:data;
    if(!pool.length)return null;

    const total=pool.reduce((s,x)=>s+x.trialCount,0)||1;
    const rec=pool.filter(s=>s.recruitingCount>0).length;
    const enroll=pool.reduce((s,x)=>s+x.totalEnrollment,0);
    const completed=pool.reduce((s,x)=>s+x.completedCount,0);

    const sc={};pool.forEach(s=>Object.entries(s.statuses).forEach(([k,v])=>{sc[k]=(sc[k]||0)+v;}));
    const statusDonut=Object.entries(sc).sort((a,b)=>b[1]-a[1]).slice(0,7)
      .map(([k,v])=>({key:k,label:k.replace(/_/g,' '),value:v,color:SC_COLORS[k]||'#888'}));

    const pc={};pool.forEach(s=>s.phases.forEach(p=>{pc[p]=(pc[p]||0)+1;}));
    const phaseBar=PHASES.filter(p=>pc[p])
      .map(p=>({key:p,label:p.replace('_',' '),shortLabel:p.replace('EARLY_PHASE1','E.Ph1').replace('PHASE','Ph'),value:pc[p],color:PH_COL[p]}));

    const fc={};pool.forEach(s=>Object.entries(s.funderClasses).forEach(([k,v])=>{fc[k]=(fc[k]||0)+v;}));
    const funderDonut=Object.entries(fc)
      .map(([k,v])=>({key:k,label:(FM[k]||FM.OTHER).label,value:v,color:(FM[k]||FM.OTHER).color}));

    const yc={};pool.forEach(s=>s.trials.forEach(t=>{if(t.startDate){const y=parseInt(t.startDate.slice(0,4));if(y>=2014&&y<=2026)yc[y]=(yc[y]||0)+1;}}));
    const yearLine=Object.entries(yc).sort((a,b)=>a[0]-b[0])
      .map(([y,v])=>({key:y,label:y,shortLabel:y.slice(2),value:v}));

    const cc={};pool.forEach(s=>{cc[s.country]=(cc[s.country]||0)+s.trialCount;});
    const topCountries=Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,15)
      .map(([k,v])=>({key:k,label:k,value:v}));

    return{total,rec,enroll,completed,statusDonut,phaseBar,funderDonut,yearLine,topCountries,
      sites:pool.length,countries:new Set(pool.map(s=>s.country)).size};
  },[filtered,data]);

  /* sync export scope */
  useEffect(()=>{
    const labels=Object.entries(filters).filter(([,v])=>v).map(([k,v])=>`${k}:${v}`);
    onFilterChange&&onFilterChange(anyFilter?filtered:null,anyFilter?labels.join(', '):'all sites');
  },[filtered,anyFilter]);

  if(!data.length)return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'80px 0',gap:14,color:'var(--text-3)'}}>
      <Spin s={32}/><span style={{fontSize:12.5}}>Loading data from ClinicalTrials.gov…</span>
    </div>
  );
  if(!derived)return null;

  const {total,rec,enroll,completed,statusDonut,phaseBar,funderDonut,yearLine,topCountries,sites,countries}=derived;

  /* helper: dim label for filter pills */
  const filterLabel=(dim)=>{
    if(!filters[dim])return null;
    if(dim==='funder')return(FM[filters[dim]]||FM.OTHER).label;
    return filters[dim].replace(/_/g,' ');
  };

  return(
    <div className="section">

      {/* ── KPI strip — always reflects filtered pool ── */}
      <div className="kpi-strip">
        <div className="kpi"><div className="kpi-label">Sites</div><div className="kpi-val">{sites.toLocaleString()}</div><div className="kpi-sub">{anyFilter?'matching filter':'unique facilities'}</div></div>
        <div className="kpi"><div className="kpi-label">Trial records</div><div className="kpi-val">{total.toLocaleString()}</div><div className="kpi-sub">site–trial associations</div></div>
        <div className="kpi"><div className="kpi-label">Recruiting now</div><div className="kpi-val">{rec.toLocaleString()}</div><div className="kpi-sub">actively enrolling</div></div>
        <div className="kpi"><div className="kpi-label">Countries</div><div className="kpi-val">{countries}</div><div className="kpi-sub">represented</div></div>
        <div className="kpi"><div className="kpi-label">Enrollment target</div><div className="kpi-val">{enroll.toLocaleString()}</div><div className="kpi-sub">total participants</div></div>
        <div className="kpi"><div className="kpi-label">Completion rate</div><div className="kpi-val">{total>0?(completed/total*100).toFixed(0):0}%</div><div className="kpi-sub">completed trials</div></div>
      </div>

      {/* ── Active filter pills ── */}
      {anyFilter&&(
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:14,padding:'7px 11px',background:'var(--blue-bg)',border:'1px solid var(--border)',borderRadius:'var(--r)',fontSize:12,flexWrap:'wrap'}}>
          <span style={{color:'var(--blue)',fontWeight:500,marginRight:2}}>Active filters</span>
          {['status','phase','funder','country'].map(dim=>filterLabel(dim)&&(
            <button key={dim} className="badge b-neutral" onClick={()=>toggle(dim,filters[dim])}
              style={{cursor:'pointer',border:'1px solid var(--border-strong)',display:'inline-flex',alignItems:'center',gap:4,height:20}}>
              {filterLabel(dim)} <span style={{fontSize:13,lineHeight:1,marginTop:-1}}>×</span>
            </button>
          ))}
          <span style={{color:'var(--text-3)'}}>→ {filtered.length.toLocaleString()} sites</span>
          <button className="btn btn-d btn-sm" style={{marginLeft:'auto'}} onClick={clearAll}>Clear all</button>
        </div>
      )}

      {/* ── Row 1: status donut · phase bars · funder donut ── */}
      <div className="g3" style={{marginBottom:14}}>

        {/* Status donut — clicking filters by status; bars below re-derive */}
        <div className="card">
          <div className="card-hd">
            <div style={{minWidth:0}}>
              <div className="card-title">Recruitment status</div>
              {filters.status&&<div className="card-sub">{filters.status.replace(/_/g,' ')}</div>}
            </div>
            {filters.status&&<button className="btn btn-d btn-sm" onClick={()=>toggle('status',filters.status)}>×</button>}
          </div>
          <div className="card-bd" style={{display:'flex',gap:12,alignItems:'flex-start'}}>
            <Donut data={statusDonut} size={106} activeKey={filters.status}
              onCk={s=>toggle('status',s.key)}/>
            <div style={{flex:1,minWidth:0}}>
              {statusDonut.map(d=>(
                <div key={d.key} onClick={()=>toggle('status',d.key)}
                  style={{display:'flex',alignItems:'center',gap:5,padding:'3px 4px',borderRadius:4,cursor:'pointer',
                    opacity:filters.status&&filters.status!==d.key?.38:1,
                    background:filters.status===d.key?'var(--bg-subtle)':'transparent',transition:'opacity .12s'}}>
                  <span style={{width:6,height:6,borderRadius:'50%',background:d.color,flexShrink:0}}/>
                  <span style={{flex:1,fontSize:10.5,color:'var(--text-2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.label}</span>
                  <span style={{fontSize:10.5,fontWeight:500,fontVariantNumeric:'tabular-nums',flexShrink:0}}>
                    {(d.value/total*100).toFixed(0)}%
                  </span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Phase bars — clicking filters by phase */}
        <div className="card">
          <div className="card-hd">
            <div style={{minWidth:0}}>
              <div className="card-title">Sites by phase</div>
              {filters.phase&&<div className="card-sub">{filters.phase.replace(/_/g,' ')}</div>}
            </div>
            {filters.phase&&<button className="btn btn-d btn-sm" onClick={()=>toggle('phase',filters.phase)}>×</button>}
          </div>
          <div className="card-bd">
            <BarChart data={phaseBar} h={116} activeKey={filters.phase}
              onCk={b=>toggle('phase',b.key)}/>
            {!phaseBar.length&&<div style={{textAlign:'center',fontSize:11,color:'var(--text-3)',paddingTop:20}}>No phase data in current filter</div>}
          </div>
        </div>

        {/* Funder donut — clicking filters by funder */}
        <div className="card">
          <div className="card-hd">
            <div style={{minWidth:0}}>
              <div className="card-title">Funding source</div>
              {filters.funder&&<div className="card-sub">{(FM[filters.funder]||FM.OTHER).label}</div>}
            </div>
            {filters.funder&&<button className="btn btn-d btn-sm" onClick={()=>toggle('funder',filters.funder)}>×</button>}
          </div>
          <div className="card-bd" style={{display:'flex',gap:12,alignItems:'flex-start'}}>
            <Donut data={funderDonut} size={106} activeKey={filters.funder}
              onCk={s=>toggle('funder',s.key)}/>
            <div style={{flex:1,minWidth:0}}>
              {funderDonut.map(d=>{
                const t=funderDonut.reduce((a,x)=>a+x.value,0)||1;
                return(
                  <div key={d.key} onClick={()=>toggle('funder',d.key)}
                    style={{display:'flex',alignItems:'center',gap:5,padding:'3px 4px',borderRadius:4,cursor:'pointer',
                      opacity:filters.funder&&filters.funder!==d.key?.38:1,
                      background:filters.funder===d.key?'var(--bg-subtle)':'transparent',transition:'opacity .12s'}}>
                    <span style={{width:6,height:6,borderRadius:'50%',background:d.color,flexShrink:0}}/>
                    <span style={{flex:1,fontSize:10.5,color:'var(--text-2)'}}>{d.label}</span>
                    <span style={{fontSize:10.5,fontWeight:500,fontVariantNumeric:'tabular-nums',flexShrink:0}}>
                      {(d.value/t*100).toFixed(0)}%
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>

      {/* ── Row 2: timeline + countries ── */}
      <div className="g2" style={{marginBottom:14}}>
        <div className="card">
          <div className="card-hd"><div className="card-title">Trial starts by year</div><div className="card-sub">Derived from filtered pool</div></div>
          <div className="card-bd">
            <LineChart data={yearLine} h={116} color="var(--blue)"/>
            {!yearLine.length&&<div style={{textAlign:'center',fontSize:11,color:'var(--text-3)',paddingTop:20}}>No year data in current filter</div>}
          </div>
        </div>
        <div className="card">
          <div className="card-hd">
            <div style={{minWidth:0}}>
              <div className="card-title">Top countries</div>
              {filters.country&&<div className="card-sub">{filters.country}</div>}
            </div>
            {filters.country&&<button className="btn btn-d btn-sm" onClick={()=>toggle('country',filters.country)}>{filters.country} ×</button>}
          </div>
          <div className="card-bd">
            <HBar
              data={topCountries.map(d=>({...d,color:d.key===filters.country?'var(--amber)':'var(--blue)' }))}
              onCk={d=>toggle('country',d.key)}/>
          </div>
        </div>
      </div>

      {/* ── Row 3: site list ── */}
      <div className="card">
        <div className="card-hd">
          <div>
            <div className="card-title">Top sites{anyFilter?' — filtered':' — globally'}</div>
            <div className="card-sub">
              {anyFilter
                ?`${filtered.length.toLocaleString()} sites match active filters`
                :'Ranked by total trial participation'}
            </div>
          </div>
          <button className="btn btn-d btn-sm" onClick={()=>setSection('topSites')}>View all →</button>
        </div>
        <div className="card-bd" style={{padding:'3px 14px'}}>
          {(anyFilter?filtered:data).slice(0,10).map((s,i)=>(
            <div key={s.key} className="rl-item" onClick={()=>onOpen(s)} style={{padding:'8px 5px'}}>
              <span className="rl-num">{i+1}</span>
              <div className="rl-info">
                <div className="rl-name">{s.name}</div>
                <div className="rl-meta">{s.city}, {s.country}</div>
              </div>
              <div style={{display:'flex',gap:3,flexShrink:0}}>
                <span className="badge b-blue">{s.trialCount.toLocaleString()}</span>
                {s.recruitingCount>0&&<span className="badge b-green">{s.recruitingCount}</span>}
                <FB fc={s.dominantFunder}/>
              </div>
            </div>
          ))}
          {!(anyFilter?filtered:data).length&&(
            <div style={{textAlign:'center',padding:'24px 0',fontSize:12,color:'var(--text-3)'}}>No sites match the current filter combination.</div>
          )}
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════════
   GLOBAL MAP (Leaflet)
══════════════════════════════════════════════════════════ */
const MapSection=({data,onOpen})=>{
  const mapRef=useRef(null);
  const leafRef=useRef(null);
  const markersRef=useRef(null);

  // aggregate by country for choropleth-like circles
  const countryData=useMemo(()=>{
    const cc={},cs={};
    data.forEach(s=>{
      cc[s.country]=(cc[s.country]||0)+s.trialCount;
      if(!cs[s.country])cs[s.country]=[];
      cs[s.country].push(s);
    });
    return{counts:cc,sites:cs};
  },[data]);

  // site points with coords
  const sitePoints=useMemo(()=>data.filter(s=>s.lat&&s.lng).slice(0,800),[data]);

  const [view,setView]=useState('sites'); // 'sites' | 'heatmap'
  const [selectedCountry,setSelectedCountry]=useState(null);
  const [mapReady,setMapReady]=useState(false);

  useEffect(()=>{
    if(!mapRef.current||leafRef.current)return;
    // init map
    const map=L.map(mapRef.current,{center:[20,0],zoom:2,zoomControl:true,attributionControl:true});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap contributors'}).addTo(map);
    leafRef.current=map;
    setMapReady(true);
    return()=>{map.remove();leafRef.current=null;};
  },[]);

  useEffect(()=>{
    if(!leafRef.current||!mapReady||!data.length)return;
    const map=leafRef.current;
    // clear old
    if(markersRef.current){markersRef.current.forEach(m=>m.remove());markersRef.current=null;}

    const markers=[];
    if(view==='sites'){
      sitePoints.forEach(site=>{
        const r=Math.max(4,Math.min(18,4+site.trialCount*.08));
        const color=SC_COLORS.RECRUITING;
        const c=L.circleMarker([site.lat,site.lng],{
          radius:r,
          fillColor:site.recruitingCount>0?color:'#2471a3',
          color:'#fff',weight:1,opacity:.9,fillOpacity:.75
        });
        c.bindPopup(`
          <div style="font-family:-apple-system,sans-serif;font-size:12px;min-width:180px">
            <div style="font-weight:600;margin-bottom:4px;line-height:1.3">${site.name}</div>
            <div style="color:#666;margin-bottom:6px">${site.city}, ${site.country}</div>
            <div style="display:flex;flex-wrap:wrap;gap:3px">
              <span style="background:#e6f1fb;color:#1a5276;padding:1px 6px;border-radius:3px;font-size:11px">${site.trialCount} trials</span>
              ${site.recruitingCount>0?`<span style="background:#eaf5ee;color:#1a6b3a;padding:1px 6px;border-radius:3px;font-size:11px">${site.recruitingCount} recruiting</span>`:''}
            </div>
          </div>
        `,{maxWidth:240});
        c.addTo(map);

/* ── TOP SITES ──────────────────────────────────────── */
const TopSites=({data,onOpen,onFilterChange})=>{
  const [sf,setSf]=useState('all');const [cf,setCf]=useState('all');const [ff,setFf]=useState('all');
  const countries=useMemo(()=>[...new Set(data.map(s=>s.country))].sort(),[data]);
  const filtered=useMemo(()=>{
    let r=[...data];
    if(sf==='recruiting')r=r.filter(s=>s.recruitingCount>0);else if(sf==='completed')r=r.filter(s=>s.completedCount>0);else if(sf==='phase3')r=r.filter(s=>s.phases.includes('PHASE3'));
    if(cf!=='all')r=r.filter(s=>s.country===cf);
    if(ff!=='all')r=r.filter(s=>s.dominantFunder===ff);
    return r;
  },[data,sf,cf,ff]);
  useEffect(()=>{const labels=[sf!=='all'?sf:null,cf!=='all'?cf:null,ff!=='all'?(FM[ff]||FM.OTHER).label:null].filter(Boolean);onFilterChange&&onFilterChange(filtered,labels.length?labels.join(', '):'all sites');},[filtered]);
  return(
    <div className="section">
      <div className="form-row">
        {[{v:sf,set:setSf,l:'Status',opts:[['all','All statuses'],['recruiting','Currently recruiting'],['completed','Has completed'],['phase3','Phase 3']]},
          {v:cf,set:setCf,l:'Country',opts:[['all','All countries'],...countries.map(c=>[c,c])]},
          {v:ff,set:setFf,l:'Funder type',opts:[['all','All funders'],...Object.entries(FM).map(([k,v])=>[k,v.label])]}
        ].map(f=>(
          <div key={f.l} className="field" style={{flex:1}}>
            <label>{f.l}</label>
            <select className="sel" value={f.v} onChange={e=>f.set(e.target.value)}>
              {f.opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
            </select>
          </div>
        ))}
      </div>
      <div style={{fontSize:11,color:'var(--text-3)',marginBottom:12}}>Showing {Math.min(filtered.length,50).toLocaleString()} of {filtered.length.toLocaleString()} sites</div>
      <SiteGrid sites={filtered.slice(0,50)} onOpen={onOpen}/>
    </div>
  );
};

/* ── SEARCH SECTION ─────────────────────────────────── */
const SearchSection=({type,onOpen,onFilterChange})=>{
  const [q,setQ]=useState('');const [phase,setPhase]=useState('');const [status,setStatus]=useState('');
  const [res,setRes]=useState(null);const [loading,setLoading]=useState(false);
  const sugg=type==='drug'?DRUGS:DISEASES;
  const doSearch=async(qv=q)=>{
    if(!qv.trim())return;setLoading(true);
    const params=type==='drug'?{'query.intr':qv}:{'query.cond':qv};
    if(phase)params['filter.phase']=phase;if(status)params['filter.overallStatus']=status;
    const studies=await fetchAll(params,10);const sites=processSites(studies);
    setRes({sites,q:qv,total:studies.length});
    onFilterChange&&onFilterChange(sites,`${type==='drug'?'drug':'disease'}: ${qv}`);
    setLoading(false);
  };
  const topBar=useMemo(()=>{
    if(!res)return[];
    return res.sites.slice(0,12).map(s=>({key:s.key,label:s.name.length>18?s.name.slice(0,17)+'…':s.name,value:s.trialCount,color:'var(--blue)',rows:[{l:'Location',v:`${s.city}, ${s.country}`},{l:'Recruiting',v:s.recruitingCount}]}));
  },[res]);
  return(
    <div className="section">
      <div className="form-row">
        <AutoInput value={q} onChange={setQ} onSelect={v=>{setQ(v);doSearch(v);}} onEnter={()=>doSearch()}
          placeholder={type==='drug'?'e.g. Pembrolizumab, Remdesivir…':"e.g. Breast Cancer, COVID-19…"}
          suggestions={sugg} loading={loading} label={type==='drug'?'Drug or intervention':'Disease or condition'}/>
        <div className="field" style={{minWidth:135}}><label>Phase</label>
          <select className="sel" value={phase} onChange={e=>setPhase(e.target.value)}>
            <option value="">Any phase</option>
            {PHASES.map(p=><option key={p} value={p}>{p.replace(/_/g,' ')}</option>)}
          </select>
        </div>
        <div className="field" style={{minWidth:160}}><label>Status</label>
          <select className="sel" value={status} onChange={e=>setStatus(e.target.value)}>
            <option value="">Any status</option>
            <option value="RECRUITING">Recruiting</option>
            <option value="COMPLETED">Completed</option>
            <option value="ACTIVE_NOT_RECRUITING">Active, not recruiting</option>
          </select>
        </div>
        <button className="btn btn-p" onClick={()=>doSearch()} disabled={loading||!q.trim()} style={{alignSelf:'flex-end'}}>
          {loading?<><Spin s={13}/>Searching</>:'Search'}
        </button>
      </div>
      {!res&&!loading&&(
        <div>
          <div style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'.5px',color:'var(--text-3)',marginBottom:7}}>Common searches</div>
          <div className="chips">{sugg.slice(0,12).map(s=><button key={s} className="chip" onClick={()=>{setQ(s);doSearch(s);}}>{s}</button>)}</div>
        </div>
      )}
      {res&&(
        <div>
          <div className="alert alert-ok">Found <strong>{res.sites.length.toLocaleString()} sites</strong> for <strong>{res.q}</strong> — {res.total.toLocaleString()} study records</div>
          <div className="kpi-strip" style={{marginBottom:14}}>
            <div className="kpi"><div className="kpi-label">Sites</div><div className="kpi-val">{res.sites.length.toLocaleString()}</div></div>
            <div className="kpi"><div className="kpi-label">Recruiting</div><div className="kpi-val">{res.sites.filter(s=>s.recruitingCount>0).length.toLocaleString()}</div></div>
            <div className="kpi"><div className="kpi-label">Countries</div><div className="kpi-val">{new Set(res.sites.map(s=>s.country)).size}</div></div>
            <div className="kpi"><div className="kpi-label">Enrollment target</div><div className="kpi-val">{res.sites.reduce((a,s)=>a+s.totalEnrollment,0).toLocaleString()}</div></div>
          </div>
          {topBar.length>0&&<div className="card" style={{marginBottom:14}}><div className="card-hd"><div className="card-title">Top sites by trial count</div></div><div className="card-bd"><BarChart data={topBar} h={130} onCk={b=>onOpen(res.sites.find(s=>s.key===b.key))}/></div></div>}
          <SiteGrid sites={res.sites.slice(0,40)} onOpen={onOpen}/>
        </div>
      )}
    </div>
  );
};

/* ── BY FUNDER ──────────────────────────────────────── */
const FunderSection=({data,onOpen,onFilterChange})=>{
  const [funder,setFunder]=useState('INDUSTRY');const [cond,setCond]=useState('');

    let r=data.filter(s=>s.dominantFunder===funder||(s.funderClasses[funder]||0)>0);
    if(cond.trim()){const q=cond.toLowerCase();r=r.filter(s=>s.conditions.some(c=>c.toLowerCase().includes(q)));}
    return r;
  },[data,funder,cond]);
  useEffect(()=>{onFilterChange&&onFilterChange(filtered,`funder: ${(FM[funder]||FM.OTHER).label}${cond?` + ${cond}`:''}`);},[filtered]);
  const breakdown=useMemo(()=>{const agg={};filtered.forEach(s=>Object.entries(s.funderClasses).forEach(([k,v])=>{agg[k]=(agg[k]||0)+v;}));return agg;},[filtered]);
  const donutData=Object.entries(breakdown).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({key:k,label:(FM[k]||FM.OTHER).label,value:v,color:(FM[k]||FM.OTHER).color}));
  const topBar=filtered.slice(0,12).map(s=>({key:s.key,label:s.name.length>18?s.name.slice(0,17)+'…':s.name,value:s.trialCount,color:(FM[funder]||FM.OTHER).color,rows:[{l:'Location',v:`${s.city}, ${s.country}`}]}));
  return(
    <div className="section">
      <div className="alert alert-info">Funder classifications per ClinicalTrials.gov: Industry = pharma/biotech · NIH = National Institutes of Health · Federal = DoD, VA, FDA · Academic = universities, non-profits, foundations</div>
      <div className="form-row">
        <div className="field" style={{flex:1}}><label>Funder category</label>
          <select className="sel" value={funder} onChange={e=>setFunder(e.target.value)}>
            {Object.entries(FM).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
        </div>
        <div className="field" style={{flex:2}}><label>Filter by condition</label>
          <input className="inp" value={cond} onChange={e=>setCond(e.target.value)} placeholder="e.g. cancer, diabetes, hypertension…"/>
        </div>
      </div>
      <div className="kpi-strip" style={{marginBottom:14}}>
        <div className="kpi"><div className="kpi-label">Sites</div><div className="kpi-val">{filtered.length.toLocaleString()}</div></div>
        <div className="kpi"><div className="kpi-label">Total trials</div><div className="kpi-val">{filtered.reduce((a,s)=>a+s.trialCount,0).toLocaleString()}</div></div>
        <div className="kpi"><div className="kpi-label">Recruiting</div><div className="kpi-val">{filtered.reduce((a,s)=>a+s.recruitingCount,0).toLocaleString()}</div></div>
        <div className="kpi"><div className="kpi-label">Countries</div><div className="kpi-val">{new Set(filtered.map(s=>s.country)).size}</div></div>
      </div>
      {donutData.length>0&&(
        <div className="g2" style={{marginBottom:14}}>
          <div className="card"><div className="card-hd"><div className="card-title">Funding mix</div></div>
            <div className="card-bd" style={{display:'flex',gap:16,alignItems:'center'}}>
              <Donut data={donutData} size={120}/>
              <div style={{flex:1}}>{donutData.map(d=>{const t=donutData.reduce((a,x)=>a+x.value,0)||1;return(<div key={d.key} style={{display:'flex',alignItems:'center',gap:7,padding:'3px 0',fontSize:11.5}}><span style={{width:7,height:7,borderRadius:'50%',background:d.color,flexShrink:0}}/><span style={{flex:1,color:'var(--text-2)'}}>{d.label}</span><span style={{fontWeight:500,fontVariantNumeric:'tabular-nums'}}>{d.value.toLocaleString()}</span><span style={{color:'var(--text-3)',width:32,textAlign:'right'}}>{(d.value/t*100).toFixed(0)}%</span></div>);})}</div>
            </div>
          </div>
          <div className="card"><div className="card-hd"><div className="card-title">Top sites</div></div><div className="card-bd"><BarChart data={topBar} h={120} onCk={b=>onOpen(filtered.find(s=>s.key===b.key))}/></div></div>
        </div>
      )}

/* ── COMPARE ────────────────────────────────────────── */
const Compare=({data,onOpen})=>{
  const [q1,setQ1]=useState('');const [q2,setQ2]=useState('');
  const [s1,setS1]=useState(null);const [s2,setS2]=useState(null);const [err,setErr]=useState('');
  const names=useMemo(()=>data.map(s=>s.name),[data]);
  const doCompare=()=>{
    const r1=data.find(s=>s.name.toLowerCase().includes(q1.toLowerCase()));
    const r2=data.find(s=>s.name.toLowerCase().includes(q2.toLowerCase()));
    if(!r1||!r2){setErr(`${!r1?'"'+q1+'" ':''} ${!r2?'"'+q2+'" ':''} not found.`);return;}
    setErr('');setS1(r1);setS2(r2);
  };
  const metrics=s1&&s2?[
    {l:'Total trials',v1:s1.trialCount,v2:s2.trialCount},
    {l:'Recruiting',v1:s1.recruitingCount,v2:s2.recruitingCount},
    {l:'Completed',v1:s1.completedCount,v2:s2.completedCount},
    {l:'Sponsors',v1:s1.sponsors.length,v2:s2.sponsors.length},
    {l:'Conditions',v1:s1.conditions.length,v2:s2.conditions.length},
    {l:'Enrollment target',v1:s1.totalEnrollment,v2:s2.totalEnrollment},
  ]:[];
  return(
    <div className="section">
      <div style={{display:'grid',gridTemplateColumns:'1fr 46px 1fr',gap:14,alignItems:'flex-end',marginBottom:14}}>
        <AutoInput value={q1} onChange={setQ1} onSelect={setQ1} onEnter={doCompare} suggestions={names} placeholder="e.g. Johns Hopkins, Mayo Clinic…" label="Site 1"/>
        <div style={{width:46,height:33,border:'1px solid var(--border)',borderRadius:'var(--r)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600,color:'var(--text-3)',background:'var(--bg-subtle)',flexShrink:0}}>vs</div>
        <AutoInput value={q2} onChange={setQ2} onSelect={setQ2} onEnter={doCompare} suggestions={names} placeholder="e.g. Memorial Sloan Kettering…" label="Site 2"/>
      </div>
      <button className="btn btn-p" onClick={doCompare} style={{marginBottom:18}}>Compare</button>
      {err&&<div className="alert alert-warn">{err}</div>}
      {s1&&s2&&(
        <div>
          <div className="g2" style={{marginBottom:14}}>
            {[s1,s2].map((s,idx)=>(
              <div key={idx} className="card" style={{borderColor:idx===0?'var(--blue)':'var(--border-strong)',cursor:'pointer'}} onClick={()=>onOpen(s)}>
                <div className="card-bd"><div style={{fontSize:14,fontWeight:500,marginBottom:2}}>{s.name}</div><div style={{fontSize:11,color:'var(--text-3)',marginBottom:10}}>{s.city}, {s.country}</div><FunderBar classes={s.funderClasses}/></div>
              </div>
            ))}
          </div>
          <div className="card" style={{marginBottom:14}}>
            <div className="card-hd"><div className="card-title">Metric comparison</div></div>
            <div className="card-bd">
              {metrics.map(m=>{
                const mx=Math.max(m.v1,m.v2,1);
                return(
                  <div key={m.l} style={{display:'grid',gridTemplateColumns:'1fr 95px 1fr',gap:14,alignItems:'center',padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                    <div>
                      <div style={{fontWeight:600,fontVariantNumeric:'tabular-nums',fontSize:14,textAlign:'right',color:m.v1>m.v2?'var(--blue)':m.v1<m.v2?'var(--text-3)':'var(--text)'}}>{m.v1.toLocaleString()}</div>
                      <PBar val={m.v1} max={mx} color="var(--blue)"/>
                    </div>
                    <div style={{textAlign:'center',fontSize:10.5,color:'var(--text-3)',fontWeight:500}}>{m.l}</div>
                    <div>
                      <div style={{fontWeight:600,fontVariantNumeric:'tabular-nums',fontSize:14,color:m.v2>m.v1?'var(--purple)':m.v2<m.v1?'var(--text-3)':'var(--text)'}}>{m.v2.toLocaleString()}</div>
                      <PBar val={m.v2} max={mx} color="var(--purple)"/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <div className="g2">
            {['sponsors','conditions'].map(f=>{
              const common=s1[f].filter(x=>s2[f].includes(x));
              return(
                <div key={f} className="card">
                  <div className="card-hd"><div className="card-title">Common {f} ({common.length})</div></div>
                  <div className="card-bd">{common.length?<div style={{display:'flex',flexWrap:'wrap',gap:3}}>{common.slice(0,12).map(x=><span key={x} className="badge b-neutral">{x}</span>)}</div>:<span style={{fontSize:11,color:'var(--text-3)'}}>None in common</span>}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
};

  return(
    <div className="section">
      <div className="g2">
        <div className="card"><div className="card-hd"><div className="card-title">About</div></div>
          <div className="card-bd" style={{fontSize:12.5,lineHeight:1.7,color:'var(--text-2)'}}>
            <p>TrialSite Intelligence queries the <strong style={{color:'var(--text)',fontWeight:500}}>ClinicalTrials.gov API v2</strong> in real time and analyses data at the site level — showing which research institutions run the most trials, funding sources, therapeutic focus areas, and recruitment activity.</p>
            <div className="divider"/>
            <p style={{fontWeight:500,color:'var(--text)',marginBottom:5}}>Use cases</p>
            <ul style={{paddingLeft:14,display:'flex',flexDirection:'column',gap:3}}>{['Clinical operations evaluating site networks','Business development identifying partnerships','Researchers locating experienced trial sites','Analysts mapping R&D competitive landscapes','Investors tracking institutional research activity'].map(t=><li key={t}>{t}</li>)}</ul>
          </div>
        </div>
        <div className="card"><div className="card-hd"><div className="card-title">Data dictionary</div></div>
          <div className="card-bd" style={{fontSize:12.5}}>
            <div style={{fontWeight:500,marginBottom:7}}>Funder classifications</div>
            <table style={{width:'100%',marginBottom:14}}><tbody>{Object.entries(FM).map(([k,v])=><tr key={k}><td style={{paddingBottom:5,paddingRight:12}}><FB fc={k}/></td><td style={{color:'var(--text-2)',paddingBottom:5,fontSize:11.5}}>{k==='INDUSTRY'?'Pharma and biotech companies':k==='NIH'?'National Institutes of Health':k==='FED'?'DoD, VA, FDA, other federal agencies':'Universities, non-profits, foundations'}</td></tr>)}</tbody></table>
            <div style={{fontWeight:500,marginBottom:7}}>Recruitment status</div>
            <table style={{width:'100%'}}><tbody><tr><td style={{paddingBottom:5,paddingRight:12}}><SB status="RECRUITING"/></td><td style={{color:'var(--text-2)',fontSize:11.5,paddingBottom:5}}>Actively enrolling participants</td></tr><tr><td style={{paddingBottom:5,paddingRight:12}}><SB status="COMPLETED"/></td><td style={{color:'var(--text-2)',fontSize:11.5,paddingBottom:5}}>Trial concluded</td></tr><tr><td style={{paddingRight:12}}><SB status="ACTIVE_NOT_RECRUITING"/></td><td style={{color:'var(--text-2)',fontSize:11.5}}>Ongoing, enrollment closed</td></tr></tbody></table>
          </div>
        </div>
        <div className="card"><div className="card-hd"><div className="card-title">External resources</div></div>
          <div className="card-bd"><div className="ext-links" style={{flexDirection:'column',gap:5}}>{[['https://clinicaltrials.gov','ClinicalTrials.gov — official registry'],['https://clinicaltrials.gov/data-api/api','ClinicalTrials.gov API documentation'],['https://www.fda.gov/science-research/clinical-trials-and-human-subject-protection','FDA clinical trial information'],['https://www.nih.gov/health-information/nih-clinical-research-trials-you','NIH clinical research overview'],['https://www.who.int/clinical-trials-registry-platform','WHO International Clinical Trials Registry Platform'],['https://pubmed.ncbi.nlm.nih.gov','PubMed — biomedical literature database']].map(([h,l])=><a key={h} href={h} target="_blank" className="ext-link"><EI/>{l}</a>)}</div></div>
        </div>
        <div className="card"><div className="card-hd"><div className="card-title">Healthcare-grade design notes</div></div>
          <div className="card-bd" style={{fontSize:12,lineHeight:1.8,color:'var(--text-2)'}}>
            <div>· All data sourced directly from the <strong style={{color:'var(--text)',fontWeight:500}}>official FDA/NIH ClinicalTrials.gov registry</strong> — no intermediaries</div>
            <div>· Semantic color coding: green = recruiting/active, blue = informational, amber = caution states, red = terminated</div>
            <div>· Full dark mode support via system preference detection</div>
            <div>· Tabular numerals for all counts and percentages — no floating point display artifacts</div>
            <div>· Interactive charts use progressive disclosure — tooltips on hover, drill-down on click</div>
            <div>· Dashboard filters are cross-linked — selecting a status filters the site list in real time</div>
            <div>· Global map uses Leaflet.js with OpenStreetMap tiles — site coordinates from ClinicalTrials.gov geolocation data</div>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── APP ────────────────────────────────────────────── */
function App(){
  const [section,setSection]=useState('dashboard');
  const [data,setData]=useState([]);const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(null);const [toast,setToast]=useState(null);

  useEffect(()=>{fetchAll({},20).then(studies=>{setData(processSites(studies));setLoading(false);});},[]);

  const [exportScope,setExportScope]=useState({sites:null,label:'all sites'});

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),3000);};

  const exportCSV=()=>{
    const sites=exportScope.sites||data;
    if(!sites.length){showToast('No data to export');return;}
    const rows=[['Site Name','City','State','Country','Trials','Recruiting','Completed','Sponsors','Conditions','Funder','Enrollment','Top Conditions']];
    sites.forEach(s=>rows.push([
      `"${s.name.replace(/"/g,'""')}"`,`"${s.city}"`,`"${s.state}"`,`"${s.country}"`,
      s.trialCount,s.recruitingCount,s.completedCount,
      s.sponsors.length,s.conditions.length,
      (FM[s.dominantFunder]||FM.OTHER).label,s.totalEnrollment,
      `"${s.conditions.slice(0,5).join('; ')}"`
    ]));
    const blob=new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`trialsite_${exportScope.label.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    showToast(`Exported ${sites.length.toLocaleString()} sites`);
  };

  const nav=NAV.find(n=>n.id===section);
  return(
    <div className="shell">
      <header className="topbar">
        <a className="brand" href="#">
          <div className="brand-mark"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 3h6l1 9H8zm0 9h6l1 9H8z"/></svg></div>
          <div><div className="brand-name">TrialSite Intelligence</div><div className="brand-version">Clinical Trial Analytics</div></div>
        </a>
        <GlobalSearch data={data} onOpen={setModal}/>
        <div className="tb-right">
          <div className="pill">{loading?<><Spin s={11}/><span style={{marginLeft:4}}>Loading…</span></>:<><span className="live-dot"/><span>{data.length.toLocaleString()} sites indexed</span></>}</div>
          <button className="tb-btn" onClick={exportCSV} title={`Export ${(exportScope.sites||data).length.toLocaleString()} sites — ${exportScope.label}`}>
            Export CSV {exportScope.sites?<span style={{fontSize:10,opacity:.7}}>({exportScope.sites.length.toLocaleString()})</span>:<span style={{fontSize:10,opacity:.7}}>(all)</span>}
          </button>
        </div>
      </header>

      <div className="body">
        <nav className="sidebar">
          <div style={{paddingTop:8}}>
            <div className="nav-group">Navigation</div>
            {NAV.map(n=>(
              <div key={n.id} className={`nav-item${section===n.id?' active':''}`} onClick={()=>setSection(n.id)}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d={n.icon}/></svg>
                {n.label}
              </div>
            ))}
          </div>
          {!loading&&(
            <div className="sidebar-foot">
              <div className="nav-group" style={{padding:'0 0 8px'}}>Live data</div>
              <div className="sb-stat"><span>Sites</span><span className="v">{data.length.toLocaleString()}</span></div>
              <div className="sb-stat"><span>Recruiting</span><span className="v">{data.filter(s=>s.recruitingCount>0).length.toLocaleString()}</span></div>
              <div className="sb-stat"><span>Countries</span><span className="v">{new Set(data.map(s=>s.country)).size}</span></div>
              <div className="sb-stat"><span>Records</span><span className="v">{data.reduce((a,s)=>a+s.trialCount,0).toLocaleString()}</span></div>
            </div>
          )}
        </nav>

        <main className="content">
          <div className="ph">
            <div className="ph-title">{nav?.label}</div>
            <div className="ph-meta">ClinicalTrials.gov API v2 · {new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
          </div>
          {section==='dashboard'  &&<Dashboard   data={data} onOpen={setModal} setSection={setSection} onFilterChange={(sites,label)=>setExportScope(sites?{sites,label}:{sites:null,label:'all sites'})}/>}
          {section==='topSites'   &&<TopSites    data={data} onOpen={setModal} onFilterChange={(sites,label)=>setExportScope({sites,label})}/>}
          {section==='drug'       &&<SearchSection type="drug"    onOpen={setModal} onFilterChange={(sites,label)=>setExportScope({sites,label})}/>}
          {section==='disease'    &&<SearchSection type="disease" onOpen={setModal} onFilterChange={(sites,label)=>setExportScope({sites,label})}/>}
          {section==='phase'      &&<PhaseSection  data={data} onOpen={setModal} onFilterChange={(sites,label)=>setExportScope({sites,label})}/>}
          {section==='funder'     &&<FunderSection data={data} onOpen={setModal} onFilterChange={(sites,label)=>setExportScope({sites,label})}/>}
          {section==='map'        &&<MapSection    data={data} onOpen={setModal}/>}
          {section==='compare'    &&<Compare       data={data} onOpen={setModal}/>}
          {section==='guide'      &&<Guide/>}
        </main>
      </div>

      {modal&&<SiteModal site={modal} onClose={()=>setModal(null)}/>}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
